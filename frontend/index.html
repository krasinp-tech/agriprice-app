            <script>
            // Intercept back button on mobile (Cordova/Capacitor)
            document.addEventListener('deviceready', function() {
                document.addEventListener('backbutton', function(e) {
                    // Prevent exit on home page
                    if (window.location.pathname.endsWith('index.html') || window.location.pathname === '/' || window.location.pathname === '/index.html') {
                        // Show confirm dialog or just block
                        if (window.navigator && window.navigator.notification && window.navigator.notification.confirm) {
                            window.navigator.notification.confirm(
                                'คุณต้องการออกจากแอพหรือไม่?',
                                function(buttonIndex) {
                                    if (buttonIndex === 1) { // 1 = OK
                                        navigator.app.exitApp();
                                    }
                                },
                                'ออกจากแอพ',
                                ['ตกลง','ยกเลิก']
                            );
                        } else {
                            // Block exit (do nothing)
                        }
                        e.preventDefault();
                        return false;
                    }
                }, false);
            }, false);

            // For browser/PWA: prevent accidental exit by pushing dummy state
            if (window.history && window.location.pathname.endsWith('index.html')) {
                window.history.pushState({ home: true }, 'home', window.location.href);
                window.addEventListener('popstate', function(e) {
                    if (e.state && e.state.home) {
                        // Optionally show confirm dialog here
                        // alert('กด back อีกครั้งเพื่อออกจากแอพ');
                        window.history.pushState({ home: true }, 'home', window.location.href);
                    }
                });
            }
            </script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            if (window.i18nInit) window.i18nInit();

            // Sync theme properly for home
            const savedTheme = localStorage.getItem('agriprice_theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);

            // Listen for theme changes from other pages
            window.addEventListener('storage', (e) => {
                if (e.key === 'agriprice_theme') {
                    document.documentElement.setAttribute('data-theme', e.newValue || 'light');
                }
                if (e.key === 'lang' && window.i18nInit) window.i18nInit();
            });

            // 📱 Trigger Native Permissions (GPS & Notifications)
            // We wait a bit to ensure the user has seen the content first
            if (window.AgriPermission && window.AgriPermission.requestAll) {
                setTimeout(() => {
                    window.AgriPermission.requestAll();
                }, 1500);
            }
        });
    </script>
