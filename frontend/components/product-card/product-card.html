<!-- components/product-card/product-card.html -->
<template id="productCardTpl">
  <div class="product-card" data-seller-id="" data-seller-name="" data-product-id="" data-favorite-kind="seller">
    <div class="product-header">
      <!-- คลิกตรงนี้ไปโปรไฟล์ -->
      <div class="seller-info" data-action="open-profile" role="link" tabindex="0">
        <div class="seller-avatar">
          <img data-bind="avatar" src="assets/images/avatar-guest.svg" alt="" onerror="this.onerror=null;this.src='assets/images/avatar-guest.svg';">
        </div>
        <div class="seller-text">
          <div class="seller-name" data-bind="sellerName">ชื่อร้าน</div>
          <div class="seller-sub" data-bind="sellerSub">สินค้า</div>
        </div>
      </div>


      <div class="favorite-btn" data-action="toggle-favorite" aria-label="favorite" role="button" tabindex="0">
        <svg class="heart-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 21s-7.5-4.35-9.5-8.5C.5 9 2.5 5.5 6.5 5.5c2.1 0 3.4 1.1 4.5 2.4 1.1-1.3 2.4-2.4 4.5-2.4 4 0 6 3.5 4 7-2 4.15-9.5 8.5-9.5 8.5z"/>
        </svg>
      </div>
    </div>

    <div class="price-row">
      <div class="price-box">
        <div class="grade">A</div>
        <div class="price" data-bind="priceA">-</div>
      </div>
      <div class="price-box">
        <div class="grade">B</div>
        <div class="price" data-bind="priceB">-</div>
      </div>
      <div class="price-box">
        <div class="grade">C</div>
        <div class="price" data-bind="priceC">-</div>
      </div>
      <span class="material-icons-outlined arrow" aria-hidden="true">chevron_right</span>
    </div>

    <div class="meta-row">
      <div class="distance" data-bind="distance">○ ระยะทาง - กม.</div>
      <div class="update-time" data-bind="updateTime">อัปเดท -</div>
    </div>

    <div class="action-row">
      <button class="btn-contact" type="button" data-action="contact">ติดต่อ</button>
      <button class="btn-book" type="button" data-action="book">จองคิว</button>
    </div>
  </div>
</template>
