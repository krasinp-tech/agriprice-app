<!-- components/product-card/product-card.html -->
<template id="productCardTpl">
  <div class="product-card product-card-light" data-seller-id="" data-seller-name="" data-product-id="" data-favorite-kind="seller">
    <div class="pc-header">
      <!-- คลิกตรงนี้ไปโปรไฟล์ -->
      <div class="pc-seller-info seller-info" data-action="open-profile" role="link" tabindex="0">
        <div class="pc-avatar">
          <img data-bind="avatar" src="assets/images/avatar-guest.svg" alt="" onerror="this.onerror=null;if(!this.src.endsWith('avatar-guest.svg'))this.src='assets/images/avatar-guest.svg';">
        </div>
        <div class="pc-seller-text">
          <div class="pc-name" data-bind="sellerName" data-i18n="unspecified_shop">ชื่อร้าน</div>
          <div class="pc-sub" data-bind="sellerSub" data-i18n="unspecified_product">สินค้า</div>
        </div>
      </div>

      <div class="favorite-btn" data-action="toggle-favorite" aria-label="favorite" role="button" tabindex="0">
        <svg class="heart-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 21s-7.5-4.35-9.5-8.5C.5 9 2.5 5.5 6.5 5.5c2.1 0 3.4 1.1 4.5 2.4 1.1-1.3 2.4-2.4 4.5-2.4 4 0 6 3.5 4 7-2 4.15-9.5 8.5-9.5 8.5z"/>
        </svg>
      </div>
    </div>

    <!-- Keep price-row class for compatibility with existing JS -->
    <div class="pc-grades-row price-row">
      <div class="pc-grades-scroll">
        <div class="pc-grade-box price-box">
          <div class="pc-grade-letter">A</div>
          <div class="pc-grade-price price" data-bind="priceA">-</div>
        </div>
        <div class="pc-grade-box price-box">
          <div class="pc-grade-letter">B</div>
          <div class="pc-grade-price price" data-bind="priceB">-</div>
        </div>
        <div class="pc-grade-box price-box">
          <div class="pc-grade-letter">C</div>
          <div class="pc-grade-price price" data-bind="priceC">-</div>
        </div>
        <div class="pc-grade-box price-box">
          <div class="pc-grade-letter">D</div>
          <div class="pc-grade-price price" data-bind="priceD">-</div>
        </div>
      </div>
    </div>

    <div class="pc-footer meta-row">
      <div class="pc-footer-left distance">
        <span class="material-icons-outlined" style="font-size: 14px; vertical-align: middle;">near_me</span>
        <span data-bind="distance">
          <span data-i18n="distance">ระยะทาง</span> - <span data-i18n="km">กม.</span>
        </span>
      </div>
      <div class="update-time" data-bind="updateTime">
        <span data-i18n="updated">อัปเดท</span> -
      </div>
    </div>

    <div class="pc-actions action-row">
      <button class="pc-btn-contact btn-contact" type="button" data-action="contact" data-i18n="nav_chat">แชท</button>
      <button class="pc-btn-book btn-book" type="button" data-action="book" data-i18n="book">จองคิว</button>
    </div>
  </div>
</template>
