<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title data-i18n="all_favorites_title">รายการโปรดทั้งหมด - AGRIPRICE</title>

  <link rel="stylesheet" href="../../css/global.css" />
  <link rel="stylesheet" href="../product-card/product-card.css" />
  <link rel="stylesheet" href="./allfavorites.css" />
  <link rel="stylesheet" href="../../css/dark-mode-patch.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />

  <script src="../../js/config.js"></script>
  <script>
    window.API_BASE_URL = window.API_BASE_URL || "https://agriprice-app.onrender.com";
    window.AUTH_TOKEN_KEY = window.AUTH_TOKEN_KEY || "token";
    window.AUTH_USER_KEY = window.AUTH_USER_KEY || "user";
  </script>
  <script src="../../js/global-anim.js"></script>
  <script src="../../js/permission-manager.js"></script>
  <script>
    (function() {
      const savedTheme = localStorage.getItem('agriprice_theme');
      if (savedTheme) {
        document.documentElement.setAttribute('data-theme', savedTheme);
      } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <script src="../../js/components/i18n.js"></script>
</head>
<body>
  <main class="allfavorites-page">
    <header class="allfavorites-header">
      <a class="back-btn" href="../../index.html" aria-label="กลับหน้าแรก" data-i18n-aria-label="back_to_home">
        <span class="material-icons-outlined" aria-hidden="true">arrow_back</span>
      </a>
      <h1 class="allfavorites-title" data-i18n="all_favorites">รายการโปรดทั้งหมด</h1>
      <span class="header-spacer" aria-hidden="true"></span>
    </header>

    <section class="allfavorites-content" aria-label="รายการที่ถูกใจ">
      <div id="allFavoritesMount" class="allfavorites-cards"></div>

      <div id="allFavoritesEmpty" class="allfavorites-empty" hidden>
        <span class="material-icons-outlined" aria-hidden="true">favorite_border</span>
        <p data-i18n="no_favorites">ยังไม่มีรายการโปรด</p>
      </div>
    </section>
  </main>

  <script src="../../js/components.js"></script>
  <script src="../../js/utils/favorites-helpers.js"></script>
  <script src="./allfavorites.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (window.i18nInit) window.i18nInit();
    });
  </script>
</body>
</html>
