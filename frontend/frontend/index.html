<!-- Favorites (ถ้าใช้จริง) -->
<script>
    document.addEventListener('DOMContentLoaded', function () {
        if (window.i18nInit) window.i18nInit();
    });

    window.addEventListener('storage', function (e) {
        if (e.key === 'lang' && window.i18nInit) {
            window.i18nInit();
        }
    });

    setTimeout(() => {
        let role = "";
        try {
            const raw = localStorage.getItem(window.AUTH_USER_KEY || "user");
            const user = raw ? JSON.parse(raw) : null;
            role = String(user?.role || localStorage.getItem("role") || "").toLowerCase();
        } catch (_) {
            role = String(localStorage.getItem("role") || "").toLowerCase();
        }
        if (role !== "farmer") return;
    const script = document.createElement("script");
    script.src = "components/favorites/favorites.js";
    script.defer = true;
    document.body.appendChild(script);
  }, 50);
</script>
