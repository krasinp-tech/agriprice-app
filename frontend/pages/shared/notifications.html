<!DOCTYPE html>
<html lang="th">
<head>
   
    <script src="../../js/api-client.js"></script>
   
    <script src="../../js/auth/guard.js"></script>
 
    <script src="../../js/components/i18n.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title data-i18n="notifications_title_page">แจ้งเตือน | AGRIPRICE</title>
  <script>
    (function () {
      const savedTheme = localStorage.getItem('agriprice_theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
    <meta name="theme-color" content="#0B853C">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Kanit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="../../css/global.css" />
  <link rel="stylesheet" href="../../css/shared-pages/notifications.css" />
  <link rel="stylesheet" href="../../components/bottom-nav/bottom-nav.css" />
 
    <script src="../../js/global-anim.js"></script>
 
    <script src="../../js/permission-manager.js"></script>
  <link rel="stylesheet" href="../../css/dark-mode-patch.css">
</head>
<body data-active="notifications">



  <main class="noti-page">

    <!-- Header -->
    <header class="noti-header">
      <div class="noti-header-left">
        <div class="noti-header-icon">
          <span class="material-icons-outlined">notifications</span>
        </div>
        <h1 class="noti-header-title" data-i18n="notifications_heading">การแจ้งเตือน</h1>
      </div>
      <div style="display: flex; gap: 8px;">
        <button class="noti-refresh-btn" id="markAllReadBtn" title="อ่านทั้งหมด" data-i18n-title="mark_all_read">
          <span class="material-icons-outlined">done_all</span>
        </button>
        <button class="noti-refresh-btn" id="refreshBtn" title="รีเฟรช" data-i18n-title="refresh">
          <span class="material-icons-outlined">refresh</span>
        </button>
      </div>
    </header>

    <!-- Tabs -->
    <div class="noti-tabs" role="tablist">
      <button class="noti-tab is-active" data-tab="all" role="tab" type="button" data-i18n="all">ทั้งหมด</button>
      <button class="noti-tab" data-tab="unread" role="tab" type="button">
        <span data-i18n="unread">ยังไม่อ่าน</span>
        <span class="noti-tab-badge" id="unreadBadge" style="display: none;">0</span>
      </button>
    </div>

    <!-- List -->
    <section class="noti-list-wrap" id="notiList">
      <div id="notificationListMount">
        <!-- Premium Skeleton Cards -->
        <div class="skeleton-card">
          <div class="skeleton skeleton-avatar"></div>
          <div class="skeleton-card-content">
            <div class="skeleton skeleton-title"></div>
            <div class="skeleton skeleton-text"></div>
            <div class="skeleton skeleton-text" style="width: 40%;"></div>
          </div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton skeleton-avatar"></div>
          <div class="skeleton-card-content">
            <div class="skeleton skeleton-title"></div>
            <div class="skeleton skeleton-text"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Empty State -->
    <div class="noti-empty" id="emptyState" hidden>
      <div class="empty-icon">
        <span class="material-icons-outlined">notifications_off</span>
      </div>
      <h3 data-i18n="no_notifications_title">ยังไม่มีการแจ้งเตือน</h3>
      <p data-i18n="no_notifications_sub">เมื่อมีการอัปเดตราคา หรือใกล้ถึงคิวการจอง ระบบจะแจ้งให้คุณทราบที่นี่</p>
    </div>

  </main>

  <div id="bottomNavMount"><nav class="bottom-nav" id="bottomNav" style="view-transition-name: main-navigation;">
    <a href="index.html" class="bottom-nav-item" data-page="home">
        <span class="material-icons-outlined">home</span>
        <span class="nav-label" data-i18n="nav_home">หน้าแรก</span>
    </a>
    <a href="pages/shared/chat.html" class="bottom-nav-item" data-page="chat" style="position:relative;">
        <span class="material-icons-outlined">chat_bubble_outline</span>
        <span class="nav-label" data-i18n="nav_chat">แชท</span>
        <span class="nav-badge" style="display:none;position:absolute;top:2px;right:8px;background:#ef4444;color:#fff;font-size:10px;font-weight:700;min-width:16px;height:16px;border-radius:8px;align-items:center;justify-content:center;padding:0 3px;"></span>
    </a>
    <a href="pages/farmer/booking/booking.html" class="bottom-nav-item" data-page="booking">
        <span class="material-icons-outlined">local_mall</span>
        <span class="nav-label" data-i18n="nav_booking_history">ประวัติการจอง</span>
    </a>
    <a href="pages/shared/notifications.html" class="bottom-nav-item" data-page="notifications">
        <span class="material-icons-outlined">notifications_none</span>
        <span class="nav-label" data-i18n="nav_notifications">แจ้งเตือน</span>
    </a>
    <a href="pages/account/account.html" class="bottom-nav-item" data-page="account">
        <span class="material-icons-outlined">person_outline</span>
        <span class="nav-label" data-i18n="nav_account">บัญชี</span>
    </a>
</nav></div>
  <!-- Core Scripts -->
 
    <script src="../../js/config.js"></script>
 
    <script src="../../js/utils/storage-keys.js"></script>
 
    <script src="../../js/api-client.js"></script>
 
    <script src="../../js/auth/guard.js"></script>
  <script>window.AuthGuard.requireLogin();</script>

  <!-- Component & Page Scripts -->
 
    <script src="../../js/global-anim.js"></script>
 
    <script src="../../js/components/i18n.js"></script>
 
    <script src="../../js/components.js"></script>
 
    <script src="../../js/shared-pages/notifications.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    if (window.i18nInit) window.i18nInit();
  });
  // sync ภาษาอัตโนมัติข้ามแท็บ/ข้ามหน้า
  window.addEventListener('storage', function(e) {
    if (e.key === 'lang') {
      if (window.i18nInit) window.i18nInit();
    }
  });
</script>
</body>
</html>
