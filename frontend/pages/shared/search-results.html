<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
    <script src="../../js/config.js"></script>
    <script src="../../js/api-client.js"></script>
    <script src="../../js/components/i18n.js"></script>
    <script src="../../js/global-anim.js"></script>
    <script src="../../js/auth/guard.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title data-i18n="search_results_title_page">ผลการค้นหา - AGRIPRICE</title>
  <script>
    (function () {
      const savedTheme = localStorage.getItem('agriprice_theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
    <meta name="theme-color" content="#0B853C">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/shared-pages/search.css">
    <link rel="stylesheet" href="../../components/product-grade/product-grade.css">
    <link rel="stylesheet" href="../../components/product-card/product-card.css">
    <link rel="stylesheet" href="../../components/bottom-nav/bottom-nav.css">
    <link rel="stylesheet" href="../../css/dark-mode-patch.css">
</head>

<body data-active="home">
    <!-- ── Search Header ─────────────────────────────────── -->
    <section class="search-header-section">
        <div class="search-header-container">
            <button class="back-btn" id="backBtn" data-back>
                <span class="material-icons-outlined">arrow_back</span>
            </button>
            <div class="search-box-header">
                <input type="text" placeholder="ค้นหาผู้รับซื้อ" class="search-input-header" id="searchInput" data-i18n-placeholder="search_buyer">
                <button class="search-button-header" id="searchBtn">
                    <span class="material-icons-outlined" style="color: var(--primary); font-size: 24px;">search</span>
                </button>
            </div>
        </div>

        <!-- Filter Chips (Horizontal Scroll) -->
        <div class="filter-section">
            <button class="filter-chip" id="openDrawerBtn">
                <span class="material-icons-outlined">tune</span>
                <span data-i18n="filters">ตัวกรอง</span>
            </button>
            <button class="filter-chip active" data-sort="all" data-i18n="filter_all">ทั้งหมด</button>
            <button class="filter-chip" data-sort="recent" data-i18n="filter_recent">ล่าสุด</button>
            <button class="filter-chip" data-sort="nearest" data-i18n="filter_nearest">ใกล้ที่สุด</button>
            <button class="filter-chip" data-sort="price-low" data-i18n="filter_price_low">ราคาถูกสุด</button>
            <button class="filter-chip" data-sort="price-high" data-i18n="filter_price_high">ราคาสูงสุด</button>
        </div>
    </section>

    <!-- ── Filter Drawer (BottomSheet) ─────────────────── -->
    <div class="filter-drawer" id="filterDrawer">
        <div class="filter-drawer-overlay" id="drawerOverlay"></div>
        <div class="filter-drawer-content">
            <div class="drawer-header">
                <h3 class="drawer-title" data-i18n="filter">ตัวกรอง</h3>
                <button class="drawer-close" id="closeDrawerBtn">
                    <span class="material-icons-outlined">close</span>
                </button>
            </div>



            <div class="filter-group">
                <label class="filter-label" data-i18n="buy_month">เดือนที่รับซื้อ</label>
                <div class="filter-grid" id="monthGrid">
                    <!-- JS will inject 1-12 months as chips/buttons -->
                </div>
            </div>

            <div class="drawer-footer">
                <button class="btn-reset" id="resetFiltersBtn" data-i18n="reset_all">ล้างทั้งหมด</button>
                <button class="btn-apply" id="applyFiltersBtn" data-i18n="apply_filters">ใช้ตัวกรอง</button>
            </div>
        </div>
    </div>

    <!-- ── Results Summary ───────────────────────────────── -->
    <section class="results-summary">
        <div class="container">
            <p class="results-title">
                <span data-i18n="search_results_title">ผลการค้นหา</span>
                <span class="results-count">
                    <span id="resultCount">0</span>
                    <span data-i18n="results_count_suffix">รายการ</span>
                </span>
            </p>
        </div>
    </section>

    <!-- ── Results ───────────────────────────────────────── -->
    <section class="search-results-section">
        <div class="container">
            <div id="searchResultsMount">
                <!-- Skeleton Loader -->
                <div class="shimmer" style="height: 120px; border-radius: 16px; margin-bottom: 12px;"></div>
                <div class="shimmer" style="height: 120px; border-radius: 16px; margin-bottom: 12px;"></div>
                <div class="shimmer" style="height: 120px; border-radius: 16px; margin-bottom: 12px;"></div>
            </div>
        </div>
    </section>

    <!-- ── Bottom Nav ─────────────────────────────────────── -->
    <div id="bottomNavMount"></div>

    <!-- Core Scripts -->
    <script>window.AuthGuard.requireLogin();</script>

    <!-- Component & Page Scripts -->




    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (window.i18nInit) window.i18nInit();

            // Sync Theme Proper
            function applyTheme() {
                const savedTheme = localStorage.getItem('agriprice_theme') || 'light';
                document.documentElement.setAttribute('data-theme', savedTheme);
            }
            applyTheme();

            window.addEventListener('storage', (e) => {
                if (e.key === 'agriprice_theme') applyTheme();
            });

            // Month Grid Generation
            const monthGrid = document.getElementById('monthGrid');
            const t = (k, f) => window.i18nT ? window.i18nT(k, f) : f;
            const months = [
                t('mon_jan', 'ม.ค.'),
                t('mon_feb', 'ก.พ.'),
                t('mon_mar', 'มี.ค.'),
                t('mon_apr', 'เม.ย.'),
                t('mon_may', 'พ.ค.'),
                t('mon_jun', 'มิ.ย.'),
                t('mon_jul', 'ก.ค.'),
                t('mon_aug', 'ส.ค.'),
                t('mon_sep', 'ก.ย.'),
                t('mon_oct', 'ต.ค.'),
                t('mon_nov', 'พ.ย.'),
                t('mon_dec', 'ธ.ค.')
            ];
            months.forEach((m, idx) => {
                const btn = document.createElement('button');
                btn.className = 'filter-chip';
                btn.style.width = '100%';
                btn.style.justifyContent = 'center';
                btn.dataset.month = idx + 1;
                btn.textContent = m;
                btn.onclick = () => btn.classList.toggle('active');
                monthGrid.appendChild(btn);
            });
        });
    </script>

    <script src="../../js/components.js"></script>
    <script src="../../js/utils/location-helper.js"></script>
    <script src="../../js/utils/ui-helpers.js"></script>
    <script src="../../components/product-grade/product-grade.js"></script>
    <script src="../../components/product-card/product-card.js"></script>
    <script src="../../js/shared-pages/search.js"></script>
</body>
</html>
