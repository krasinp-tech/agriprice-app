<!DOCTYPE html>
<html lang="th">
<head>
    <script src="../../js/components/i18n.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>โปรไฟล์ผู้รับซื้อ - AGRIPRICE</title>

<link rel="stylesheet" href="../../css/global.css">
<link rel="stylesheet" href="../../css/shared-pages/profile.css">
<link rel="stylesheet" href="../../components/product-card/product-card.css">

<link rel="stylesheet" href="../../components/bottom-nav/bottom-nav.css">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
<script src="../../js/config.js"></script>
  <script src="../../js/global-anim.js"></script>
  <script src="../../js/permission-manager.js"></script>
<meta name="theme-color" content="#f8f9fa">
</head>

<body>
    <!-- Language Switcher (top-right) -->
    <!-- HERO -->
<section class="profile-hero">
    <button class="profile-back-btn" onclick="window.history.back()" aria-label="ย้อนกลับ">
        <span class="material-icons-outlined">arrow_back</span>
    </button>
    <img class="profile-hero-img" id="heroImage" src="../../assets/images/hero.png" alt="โปรไฟล์ผู้รับซื้อ" onerror="this.onerror=null;this.src='../../assets/images/hero.png';">
    <div class="hero-badge">
        <span class="hero-badge-title" id="heroBadgeTitle"></span>
        <span class="hero-badge-sub" id="heroBadgeSub"></span>
    </div>
</section>



<!-- PROFILE CARD -->
<div class="profile-info-card">

    <!-- Top Row -->
    <div class="profile-top-row">
        <div class="profile-avatar-wrap">
            <img id="profileAvatar" src="../../assets/images/avatar-guest.svg" alt="รูปผู้รับซื้อ" onerror="this.onerror=null;this.src='../../assets/images/avatar-guest.svg';">
        </div>
        <div class="profile-name-block">
            <div class="profile-name" id="profileName"></div>
            <div class="profile-tagline" id="profileTagline"></div>
        </div>
    </div>

    <!-- Status Row -->
    <div class="profile-status-row">
        <div class="status-online">
            <span class="status-dot"></span> ออนไลน์
        </div>
        <div class="status-followers">
            <span class="material-icons-outlined">person_outline</span>
            ผู้ติดตาม <span id="followersCount"></span>
        </div>
    </div>

    <!-- Action Row -->
    <div class="profile-action-row">
        <!-- ส่งข้อความ -->
        <a href="chat.html?marketId=123" class="btn-message">
            <span class="material-icons-outlined">chat_bubble_outline</span>
            ส่งข้อความ
        </a>

        <!-- โทรออก -->
        <a href="tel:0812345678" class="btn-call">
            <span class="material-icons-outlined">call</span>
            
        </a>

        <!-- ติดตาม -->
        <button class="btn-follow" id="followBtn">
            <span class="material-icons-outlined">person_add</span>
        </button>
    </div>

    <!-- Tabs removed per user request -->

    <!-- ABOUT TAB -->
    <div class="tab-panel active" id="tab-about">
        <p class="about-desc" id="aboutDesc"></p>

        <!-- Location Card -->
        <div class="location-card">
            <div class="location-header">
                <div class="location-icon-wrap">
                    <span class="material-icons-outlined">location_on</span>
                </div>
                <div class="location-text">
                    <div class="location-address" id="addressLine1"></div>
                    <div class="location-sub" id="addressLine2"></div>
                </div>
                <a id="mapLink" target="_blank" class="location-link">
                    <span class="material-icons-outlined" style="font-size:14px">open_in_new</span>
                    แสดงแผนที่
                </a>
            </div>

            <div class="map-container">
                <iframe id="mapIframe" allowfullscreen loading="lazy"></iframe>
            </div>
        </div>

        <!-- Product List -->
        <div class="products-list-title">รายการการรับซื้อ</div>
        <div id="productListContainer"></div>
    </div>

    <!-- REVIEWS TAB removed per user request -->

</div>

<!-- Bottom Nav (component) -->
<div id="bottomNavMount"></div>

<script src="../../js/components.js"></script>
<script src="../../js/config.js"></script>
<script src="../../js/api-client.js"></script>
<script src="../../js/shared-pages/profile.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        if (window.i18nInit) window.i18nInit();
    });
    // sync ภาษาอัตโนมัติข้ามแท็บ/ข้ามหน้า
    window.addEventListener('storage', function(e) {
        if (e.key === 'lang') {
            if (window.i18nInit) window.i18nInit();
        }
    });
</script>
</body>
</html>
