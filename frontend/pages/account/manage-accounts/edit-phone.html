<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title data-i18n="edit_phone_title">แก้ไขหมายเลขโทรศัพท์ | AGRIPRICE</title>
  <script>
    (function () {
      const savedTheme = localStorage.getItem('agriprice_theme') || ((window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
    <meta name="theme-color" content="#0B853C">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

  <link rel="stylesheet" href="../../../css/global.css" />
  <link rel="stylesheet" href="../../../css/account/manage-accounts/account-detail.css" />
 
    <script src="../../../js/config.js"></script>

    <script src="../../../js/api-client.js"></script>
 
    <script src="../../../js/global-anim.js"></script>
    <script src="../../../js/components/i18n.js"></script>
 
    <script src="../../../js/permission-manager.js"></script>
  <link rel="stylesheet" href="../../../css/dark-mode-patch.css">
</head>
<body data-auth="required">
  <main class="detail-page">
    <section class="detail-shell">
      <header class="detail-header">
        <a class="detail-back" href="my-account.html" aria-label="ย้อนกลับหน้าบัญชีของฉัน" data-i18n-aria-label="back_to_account">
          <span class="material-icons-outlined">chevron_left</span>
        </a>
        <div>
          <h1 class="detail-title" data-i18n="phone_number">หมายเลขโทรศัพท์</h1>
          <p class="detail-subtitle" data-i18n="phone_contact_notification_desc">แก้ไขหมายเลขที่ใช้สำหรับการติดต่อและการแจ้งเตือน</p>
        </div>
      </header>

      <section class="detail-card">
        <h2 class="detail-section-title" data-i18n="update_phone">อัปเดตหมายเลขโทรศัพท์</h2>
        <p class="detail-note"><span data-i18n="current_phone">หมายเลขปัจจุบัน:</span> <strong id="currentPhoneValue">-</strong></p>

        <form id="phoneForm" class="detail-form" novalidate>
          <div class="field-group">
            <label class="field-label" for="phoneInput" data-i18n="new_phone">หมายเลขโทรศัพท์ใหม่</label>
            <input
              class="field-input"
              id="phoneInput"
              name="phone"
              type="tel"
              autocomplete="tel"
              placeholder="เช่น +66812345678" data-i18n-placeholder="phone_example_placeholder"
              required
            />
            <p class="field-hint" data-i18n="phone_format_hint">รองรับรูปแบบ +66XXXXXXXXX หรือรูปแบบที่มีขีดคั่น</p>
          </div>

          <div class="detail-actions">
            <button type="submit" class="btn btn-primary" data-i18n="save_changes">บันทึกการเปลี่ยนแปลง</button>
            <a class="btn btn-ghost" href="my-account.html" data-i18n="cancel">ยกเลิก</a>
          </div>
        </form>

        <p id="pageMessage" class="page-message" aria-live="polite"></p>
      </section>
    </section>
  </main>

 
    <script src="../../../js/account/manage-accounts/account-store.js"></script>
 
    <script src="../../../js/account/manage-accounts/edit-phone.js"></script>

 
    <script src="../../../js/auth/guard.js"></script>
  <script>window.AuthGuard.requireLogin();</script>
</body>
</html>
