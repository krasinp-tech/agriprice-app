<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title data-i18n="deactivate_account_title">ปิดใช้งานหรือลบบัญชี | AGRIPRICE</title>
  <script>
    (function () {
      const savedTheme = localStorage.getItem('agriprice_theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
    <meta name="theme-color" content="#0B853C">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

  <link rel="stylesheet" href="../../../css/global.css" />
  <link rel="stylesheet" href="../../../css/account/manage-accounts/account-detail.css" />

    <script src="../../../js/config.js"></script>

    <script src="../../../js/api-client.js"></script>

    <script src="../../../js/global-anim.js"></script>

    <script src="../../../js/permission-manager.js"></script>
  <link rel="stylesheet" href="../../../css/dark-mode-patch.css">
</head>
<body data-auth="required">
  <main class="detail-page">
    <section class="detail-shell">
      <header class="detail-header">
        <a class="detail-back" href="my-account.html" aria-label="กลับไปบัญชีของฉัน" data-i18n-aria-label="back_to_account">
          <span class="material-icons-outlined">chevron_left</span>
        </a>
        <div>
          <h1 class="detail-title" data-i18n="deactivate_account_title">ปิดใช้งานหรือลบบัญชี</h1>
          <p class="detail-subtitle" data-i18n="deactivate_account_subtitle">จัดการสถานะบัญชี หรือขอลบบัญชีของคุณ</p>
        </div>
      </header>

      <section class="detail-card">
        <h2 class="detail-section-title" data-i18n="account_status_title">สถานะบัญชี</h2>
        <p class="detail-note" id="statusDescription" data-i18n="account_status_desc">บัญชีของคุณเปิดใช้งานอยู่</p>

        <div class="status-row">
          <span data-i18n="current_status">สถานะปัจจุบัน</span>
          <span class="status-pill" id="statusPill" data-i18n="active_status">ใช้งานปกติ</span>
        </div>

        <div class="checkbox-row">
          <input type="checkbox" id="confirmActionCheck" />
          <label for="confirmActionCheck" data-i18n="confirm_account_action">ฉันเข้าใจผลของการเปลี่ยนสถานะบัญชีนี้</label>
        </div>

        <div class="detail-actions">
          <button type="button" class="btn btn-primary" id="deactivateBtn" data-i18n="deactivate_account_btn">ปิดใช้งานบัญชี</button>
          <button type="button" class="btn btn-ghost" id="reactivateBtn" data-i18n="reactivate_account_btn">เปิดใช้งานบัญชีอีกครั้ง</button>
        </div>

        <p id="statusMessage" class="page-message" aria-live="polite"></p>
      </section>

      <section class="detail-card">
        <h2 class="detail-section-title" data-i18n="danger_zone">พื้นที่อันตราย</h2>
        <p class="detail-note" data-i18n="delete_account_warning">การลบบัญชีเป็นการดำเนินการถาวร โปรดตรวจสอบก่อนดำเนินการ</p>

        <div class="divider"></div>

        <div class="danger-zone">
          <div class="field-group">
            <label class="field-label" for="deleteKeywordInput" data-i18n="type_delete_confirm">พิมพ์ DELETE เพื่อยืนยัน</label>
            <input class="field-input" id="deleteKeywordInput" type="text" autocomplete="off" placeholder="DELETE" />
          </div>

          <div class="detail-actions">
            <button type="button" class="btn btn-danger" id="deleteAccountBtn" data-i18n="delete_account">ลบบัญชี</button>
          </div>
        </div>

        <p id="deleteMessage" class="page-message" aria-live="polite"></p>
      </section>
    </section>
  </main>


    <script src="../../../js/account/manage-accounts/account-store.js"></script>

    <script src="../../../js/components/i18n.js"></script>

    <script src="../../../js/account/manage-accounts/deactivate-account.js"></script>


    <script src="../../../js/auth/guard.js"></script>
  <script>window.AuthGuard.requireLogin();</script>
</body>
</html>
