<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title data-i18n="security_title">ความปลอดภัย | AGRIPRICE</title>
  <script>
    (function () {
      const savedTheme = localStorage.getItem('agriprice_theme') || ((window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
    <meta name="theme-color" content="#0B853C">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

  <link rel="stylesheet" href="../../../css/global.css" />
  <link rel="stylesheet" href="../../../css/account/manage-security/security.css" />
  <link rel="stylesheet" href="../../../css/dark-mode-patch.css">
</head>
<body>
  <main class="ud-page fade-slide">
    <header class="ud-header fade-slide">
      <a class="ud-back" href="../account.html" aria-label="ย้อนกลับ" data-i18n-aria-label="back">
        <span class="material-icons-outlined">chevron_left</span>
      </a>
      <h1 class="ud-title" data-i18n="security_title">ความปลอดภัย</h1>
    </header>

    <section class="ud-card fade-slide" aria-label="เมนูความปลอดภัย" data-i18n-aria-label="security_menu">
      <div class="ud-intro">
        <div class="ud-icon"><span class="material-icons-outlined">verified_user</span></div>
        <div>
          <div class="ud-text" data-i18n="security_center_title">ดูแลบัญชีให้ปลอดภัย</div>
          <div class="ud-sub" data-i18n="security_center_hint">จัดการรหัสผ่านและตรวจสอบอุปกรณ์ที่เข้าสู่ระบบ</div>
        </div>
      </div>
      <a class="ud-action" href="../manage-accounts/change-password.html">
        <span class="ud-action-icon material-icons-outlined">lock_reset</span>
        <span class="ud-action-copy"><strong data-i18n="change_password">เปลี่ยนรหัสผ่าน</strong><small data-i18n="change_password_subtitle">อัปเดตรหัสผ่านของคุณเพื่อความปลอดภัยของบัญชี</small></span>
        <span class="material-icons-outlined ud-chevron">chevron_right</span>
      </a>
      <a class="ud-action" href="../manage-device/device-management.html">
        <span class="ud-action-icon material-icons-outlined">devices</span>
        <span class="ud-action-copy"><strong data-i18n="device_title">อุปกรณ์ที่เข้าสู่ระบบ</strong><small data-i18n="device_list_title">ตรวจสอบและออกจากระบบอุปกรณ์อื่น</small></span>
        <span class="material-icons-outlined ud-chevron">chevron_right</span>
      </a>
    </section>
  </main>


    <script src="../../../js/global-anim.js"></script>

    <script src="../../../js/components/i18n.js"></script>

    <script src="../../../js/account/manage-security/security.js"></script>
</body>
</html>
