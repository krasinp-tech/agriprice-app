<!DOCTYPE html>
<html lang="th">

<head>
<meta charset="UTF-8">
  <script src="../../../js/api-client.js"></script>
  <script src="../../../js/auth/guard.js"></script>
  <script src="../../../js/components/i18n.js"></script>
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title data-i18n="address_book_title">สมุดที่อยู่ | AGRIPRICE</title>
  <script>
    (function () {
      const savedTheme = localStorage.getItem('agriprice_theme') || ((window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
  <meta name="theme-color" content="#0B853C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Google Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="../../../css/global.css">
  <link rel="stylesheet" href="../../../css/account/manage-address/address-book.css">
  <link rel="stylesheet" href="../../../css/dark-mode-patch.css">
</head>

<body>
  <main class="address-page">
    <!-- ── Header ───────────────────────────────────────── -->
    <header class="address-header fade-slide">
      <a class="back-btn" href="../account.html" aria-label="ย้อนกลับ" data-i18n-aria-label="profile_back">
        <span class="material-icons-outlined">chevron_left</span>
      </a>
      <h1 class="page-title" data-i18n="address">สมุดที่อยู่</h1>
    </header>

    <!-- ── Address List (Skeleton Loading) ── -->
    <div class="address-list" id="addressList">
      <div class="shimmer" style="height: 130px; border-radius: 20px; margin-bottom: 12px;"></div>
      <div class="shimmer" style="height: 130px; border-radius: 20px; margin-bottom: 12px;"></div>
    </div>

    <!-- ── Empty State ── -->
    <div class="empty-state" id="emptyState" style="display: none;">
      <span class="material-icons-outlined empty-icon">location_off</span>
      <h2 class="empty-title" data-i18n="no_address_saved">ยังไม่มีที่อยู่ถูกบันทึกไว้</h2>
      <p class="empty-sub" data-i18n="add_address_hint">เพิ่มที่อยู่ของคุณเพื่อความสะดวกในการจองและจัดส่ง</p>
    </div>

    <!-- ── Action Button ────────────────────────────────── -->
    <button class="btn-add-address fade-slide" id="addAddressBtn">
      <span class="material-icons-outlined">add_location_alt</span>
      <span data-i18n="add_new_address">เพิ่มที่อยู่ใหม่</span>
    </button>
  </main>

  <!-- ── Address Modal (Bottom Sheet) ────────────────────── -->
  <div class="addr-modal-backdrop" id="addrModalBackdrop">
    <div class="addr-modal" id="addrModal" role="dialog" aria-modal="true" aria-labelledby="addrModalTitle">
      <div class="addr-modal-drag"></div>
      <h2 class="addr-modal-title" id="addrModalTitle">เพิ่มที่อยู่ใหม่</h2>

      <!-- Tag Selector -->
      <div class="tag-selector" id="tagSelector">
        <button type="button" class="tag-btn active" data-tag="Home" id="tagHome">
          <span class="material-icons-outlined" style="font-size:18px;">home</span> บ้าน
        </button>
        <button type="button" class="tag-btn" data-tag="Work" id="tagWork">
          <span class="material-icons-outlined" style="font-size:18px;">work</span> ที่ทำงาน
        </button>
        <button type="button" class="tag-btn" data-tag="Other" id="tagOther">
          <span class="material-icons-outlined" style="font-size:18px;">place</span> อื่นๆ
        </button>
      </div>

      <!-- Form Fields -->
      <div class="addr-field-group">
        <div class="addr-field-row">
          <div class="addr-field">
            <label for="addrFirstName">ชื่อ</label>
            <input type="text" id="addrFirstName" placeholder="ชื่อ" autocomplete="given-name">
          </div>
          <div class="addr-field">
            <label for="addrLastName">นามสกุล</label>
            <input type="text" id="addrLastName" placeholder="นามสกุล" autocomplete="family-name">
          </div>
        </div>
        <div class="addr-field">
          <label for="addrPhone">เบอร์โทรศัพท์</label>
          <input type="tel" id="addrPhone" placeholder="0812345678" autocomplete="tel">
        </div>
        <div class="addr-field">
          <label for="addrLine1">ที่อยู่</label>
          <input type="text" id="addrLine1" placeholder="บ้านเลขที่ ถนน ซอย" autocomplete="address-line1">
        </div>
        <div class="addr-field">
          <label for="addrLine2">ตำบล / อำเภอ / จังหวัด</label>
          <input type="text" id="addrLine2" placeholder="ตำบล อำเภอ จังหวัด รหัสไปรษณีย์" autocomplete="off" role="combobox" aria-autocomplete="list" aria-expanded="false">
        </div>
      </div>

      <!-- Default Toggle -->
      <div class="addr-default-row">
        <span class="addr-default-label">ตั้งเป็นที่อยู่เริ่มต้น</span>
        <label class="notify-switch">
          <input type="checkbox" id="addrIsDefault">
          <span class="notify-slider"></span>
        </label>
      </div>

      <!-- Action Buttons -->
      <div class="addr-modal-actions">
        <button type="button" class="addr-btn-cancel" id="addrCancelBtn">ยกเลิก</button>
        <button type="button" class="addr-btn-save" id="addrSaveBtn">บันทึก</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="../../../js/config.js"></script>
  <script src="../../../js/global-anim.js"></script>
  <script src="../../../js/account/manage-address/address-book.js"></script>
  <script>
    window.AuthGuard.requireLogin();
    document.addEventListener('DOMContentLoaded', function () {
      if (window.i18nInit) window.i18nInit();
    });
  </script>
</body>

</html>
