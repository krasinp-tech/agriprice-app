<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title data-i18n="nav_notifications">การแจ้งเตือน | AGRIPRICE</title>
  <script src="../../../js/components/i18n.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

  <link rel="stylesheet" href="../../../css/global.css" />
  <link rel="stylesheet" href="../../../css/account/manage-notifications/setup-notifications.css" />
  <link rel="stylesheet" href="../../../css/dark-mode-patch.css">
  <script>
    (function() {
      const savedTheme = localStorage.getItem('agriprice_theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
</head>
<body>
  <main class="notify-page">
    <header class="notify-header">
      <a class="notify-back" href="../account.html" aria-label="ย้อนกลับ" data-i18n-aria-label="profile_back">
        <span class="material-icons-outlined">chevron_left</span>
      </a>
      <h1 class="notify-title" data-i18n="manage_notifications_title">จัดการการแจ้งเตือน</h1>
    </header>

    <section class="notify-card" aria-label="ตั้งค่าการแจ้งเตือน">
      <form id="notifyForm" class="notify-form"></form>
      <p id="notifyMessage" class="notify-message" aria-live="polite"></p>
    </section>
  </main>

  <script src="../../../js/config.js"></script>
  <script src="../../../js/global-anim.js"></script>
  <script src="../../../js/account/manage-notifications/setup-notifications.js"></script>
  <script src="../../../js/auth/guard.js"></script>
  <script>
    window.AuthGuard.requireLogin();
    document.addEventListener('DOMContentLoaded', function() {
        if (window.i18nInit) window.i18nInit();
    });
    // sync ภาษาอัตโนมัติข้ามแท็บ/ข้ามหน้า
    window.addEventListener('storage', function(e) {
      if (e.key === 'lang') {
        if (window.i18nInit) window.i18nInit();
      }
    });
  </script>
</body>
</html>
