<!DOCTYPE html>
<html lang="th">
<head>
   
    <script src="../../../js/api-client.js"></script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title data-i18n="language_title">ภาษา | AGRIPRICE</title>
  <script>
    (function () {
      const savedTheme = localStorage.getItem('agriprice_theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
    <meta name="theme-color" content="#0B853C">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

  <link rel="stylesheet" href="../../../css/global.css" />
  <link rel="stylesheet" href="../../../css/account/manage-language/language.css" />
  <link rel="stylesheet" href="../../../css/dark-mode-patch.css">
</head>
<body>
  <main class="ud-page fade-slide">
    <header class="ud-header fade-slide">
      <a class="ud-back" href="../account.html" aria-label="ย้อนกลับ" data-i18n-aria-label="back">
        <span class="material-icons-outlined">chevron_left</span>
      </a>
      <h1 class="ud-title" data-i18n="language_title">ภาษา</h1>
    </header>

    <section class="lang-card fade-slide">
      <div class="lang-icon">
        <span class="material-icons-outlined" style="font-size:48px;color:var(--primary);">translate</span>
      </div>
      <div class="lang-desc" data-i18n="select_language">เลือกภาษา</div>
      
      <div id="langSelector" class="lang-selector-ui">
        <!-- Buttons injected by i18n.js -->
      </div>

      <div class="lang-note" data-i18n="system_update_next">* การเปลี่ยนภาษาจะมีผลกับทุกหน้าของแอป</div>
    </section>
  </main>

 
    <script src="../../../js/global-anim.js"></script>
 
    <script src="../../../js/components/i18n.js"></script>
 
    <script src="../../../js/account/manage-language/language.js"></script>
