<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">

    <script src="../../../js/api-client.js"></script>

    <script src="../../../js/auth/guard.js"></script>

    <script src="../../../js/components/i18n.js"></script>
      <!-- Language Switcher (top-right) -->

    <script src="../../../js/components/ui-common.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title data-i18n="booking_success">จองคิว - การจองสำเร็จ | AGRIPRICE</title>
  <script>
    (function () {
      const savedTheme = localStorage.getItem('agriprice_theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
    <meta name="theme-color" content="#0B853C">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="../../../css/global.css">
  <link rel="stylesheet" href="../../../css/farmer/booking/booking-step4.css">
  <link rel="stylesheet" href="../../../components/bottom-nav/bottom-nav.css">

    <script src="../../../js/config.js"></script>

    <script src="../../../js/api-client.js"></script>

    <script src="../../../js/global-anim.js"></script>

    <script src="../../../js/permission-manager.js"></script>
  <link rel="stylesheet" href="../../../css/dark-mode-patch.css">
</head>

<body data-active="booking">

  <!-- Main Container -->
  <main class="booking-step4">
    <div class="booking-container">



    <!-- Hero Section -->
    <section class="hero">
      <div class="hero-bg"></div>

      <div class="hero-content">
        <div class="hero-title" id="heroTitle" data-i18n="booking_success_title">จองสำเร็จ!</div>
        <div class="hero-sub" id="heroSub" data-i18n="booking_confirmed_desc">การจองคิวของคุณได้รับการยืนยันแล้ว</div>

        <div class="big-card">
          <div class="label" data-i18n="your_queue_no">หมายเลขคิวของคุณ</div>
          <div class="queue" id="queueNo">-</div>

          <div class="subRow">
            <div class="subLabel" data-i18n="queue_time">เวลาเข้าคิว</div>
            <div class="subValue"><b id="timeText">-</b> <span data-i18n="time_unit">น.</span></div>
          </div>

          <div class="qrWrap">
            <div id="qrCanvas" style="width:110px;height:110px;display:flex;align-items:center;justify-content:center;"></div>
          </div>

          <div class="idRow">
            <div class="subLabel" data-i18n="booking_id_label">ID การจอง</div>
            <div class="subValue" id="bookingIdText">-</div>
          </div>

          <button class="btn-outline" id="btnToggleDetail">
            <span data-i18n="view_booking_details">แสดงรายละเอียดการจอง</span>
          </button>

          <div class="detailPanel" id="detailPanel" hidden></div>
        </div>
      </div>
    </section>

    <!-- Warning Card -->
    <section class="card info">
      <div class="card-title">
        <span class="material-icons-outlined">info</span>
        <span data-i18n="important_message">ข้อความสำคัญ</span>
      </div>
      <div class="card-body" id="importantNote" data-i18n="checkin_30_mins_early">
        โปรดเช็คอินก่อนถึงคิวหน้า 30 นาที เพื่อยืนยันคิวของคุณ
      </div>
    </section>

    <!-- Queue Status Card -->
    <section class="card">
      <div class="card-title">
        <span class="material-icons-outlined">groups</span>
        <span data-i18n="current_queue_status">สถานะคิวปัจจุบัน</span>
      </div>

      <div class="statusGrid">
        <div class="statusItem">
          <div class="statusLabel" data-i18n="current_queue">คิวปัจจุบัน</div>
          <div class="statusValue" id="currentQueue">-</div>
        </div>
        <div class="statusItem right">
          <div class="statusLabel" data-i18n="my_queue">คิวของฉัน</div>
          <div class="statusValue green" id="myQueue">-</div>
        </div>

        <div class="statusFoot">
          <div class="statusMini">
            <div class="statusMiniLabel" data-i18n="queues_ahead">จำนวนคิวก่อนหน้า</div>
            <div class="statusMiniValue" id="aheadCount">-</div>
          </div>
          <div class="statusMini">
            <div class="statusMiniLabel" data-i18n="eta_label">เวลาประมาณที่จะถึงคิว</div>
            <div class="statusMiniValue" id="eta">-</div>
          </div>
        </div>
      </div>
    </section>

    <!-- Map Card -->
    <section class="card">
      <div class="card-title">
        <span class="material-icons-outlined">place</span>
        <span data-i18n="map_nav">แผนที่นำทาง</span>
      </div>

      <div class="placeBox">
        <div class="placeName" id="shopName">-</div>
        <div class="placeAddr" id="shopAddr">-</div>
        <div class="map-container" id="mapContainer" style="display:none; width:100%; height:200px; border-radius:12px; overflow:hidden; margin-top:12px; margin-bottom:12px;">
          <iframe id="mapIframe" style="width:100%; height:100%; border:none;" loading="lazy"></iframe>
        </div>
        <button class="btn-map" type="button" id="openMapBtn" data-i18n="open_map">
          เปิดแผนที่นำทาง
        </button>
      </div>
    </section>

    <!-- Cancel Button -->
    <button class="btn-cancel" id="btnCancelBooking" data-i18n="cancel_booking">
      ยกเลิกการจอง
    </button>

    </div>
  </main>

  <!-- Bottom Navigation -->
  <div id="bottomNavMount"></div>

  <!-- QR Code Library -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <!-- Scripts -->


    <script src="../../../js/components.js"></script>

    <script src="../../../js/farmer/booking/booking-step4.js"></script>




<script>window.AuthGuard.requireLogin();</script>



<script>
  document.addEventListener('DOMContentLoaded', function() {
    if (window.i18nInit) window.i18nInit();
  });

</script>
</body>
</html>
