<!DOCTYPE html>
<html lang="th">
<head>
      <script src="../../../js/components/i18n.js"></script>
      <!-- Language Switcher (top-right) -->
      <script src="../../../js/components/ui-common.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จองคิว - การจองสำเร็จ | AGRIPRICE</title>

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="../../../css/global.css">
  <link rel="stylesheet" href="../../../css/farmer/booking/booking-step4.css">
  <link rel="stylesheet" href="../../../components/bottom-nav/bottom-nav.css">
  <script src="../../../js/config.js"></script>
  <script src="../../../js/api-client.js"></script>
</head>

<body data-active="booking">

  <!-- Main Container -->
  <main class="booking-step4">
    <div class="booking-container">

   

    <!-- Hero Section -->
    <section class="hero">
      <div class="hero-bg"></div>

      <div class="hero-content">
        <div class="hero-title" id="heroTitle">จองสำเร็จ!</div>
        <div class="hero-sub" id="heroSub">การจองคิวของคุณได้รับการยืนยันแล้ว</div>

        <div class="big-card">
          <div class="label">หมายเลขคิวของคุณ</div>
          <div class="queue" id="queueNo">-</div>

          <div class="subRow">
            <div class="subLabel">เวลาเข้าคิว</div>
            <div class="subValue"><b id="timeText">-</b> น.</div>
          </div>

          <div class="qrWrap">
            <div id="qrCanvas" style="width:110px;height:110px;display:flex;align-items:center;justify-content:center;"></div>
          </div>

          <div class="idRow">
            <div class="subLabel">ID การจอง</div>
            <div class="subValue" id="bookingIdText">-</div>
          </div>

          <button class="btn-outline" type="button" id="toggleDetailBtn">
            แสดงรายละเอียดการจอง
          </button>

          <div class="detailPanel" id="detailPanel" hidden></div>
        </div>
      </div>
    </section>

    <!-- Warning Card -->
    <section class="card info">
      <div class="card-title">
        <span class="material-icons-outlined">info</span>
        ข้อความสำคัญ
      </div>
      <div class="card-body" id="importantNote">
        โปรดเช็คอินก่อนถึงคิวหน้า 30 นาที เพื่อยืนยันคิวของคุณ
      </div>
    </section>

    <!-- Queue Status Card -->
    <section class="card">
      <div class="card-title">
        <span class="material-icons-outlined">groups</span>
        สถานะคิวปัจจุบัน
      </div>

      <div class="statusGrid">
        <div class="statusItem">
          <div class="statusLabel">คิวปัจจุบัน</div>
          <div class="statusValue" id="currentQueue">-</div>
        </div>
        <div class="statusItem right">
          <div class="statusLabel">คิวของฉัน</div>
          <div class="statusValue green" id="myQueue">-</div>
        </div>

        <div class="statusFoot">
          <div class="statusMini">
            <div class="statusMiniLabel">จำนวนคิวก่อนหน้า</div>
            <div class="statusMiniValue" id="aheadCount">-</div>
          </div>
          <div class="statusMini">
            <div class="statusMiniLabel">เวลาประมาณที่จะถึงคิว</div>
            <div class="statusMiniValue" id="eta">-</div>
          </div>
        </div>
      </div>
    </section>

    <!-- Map Card -->
    <section class="card">
      <div class="card-title">
        <span class="material-icons-outlined">place</span>
        แผนที่นำทาง
      </div>

      <div class="placeBox">
        <div class="placeName" id="shopName">-</div>
        <div class="placeAddr" id="shopAddr">-</div>
        <button class="btn-map" type="button" id="openMapBtn">
          เปิดแผนที่นำทาง
        </button>
      </div>
    </section>

    <!-- Cancel Button -->
    <button class="btn-cancel" id="btnCancelBooking">
      ยกเลิกการจอง
    </button>

    </div>
  </main>

  <!-- Bottom Navigation -->
  <div id="bottomNavMount"></div>

  <!-- QR Code Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <!-- Scripts -->

  <script src="../../../js/components.js"></script>
  <script src="../../../js/farmer/booking/booking-step4.js"></script>



  <script src="../../../js/auth/guard.js"></script>
<script>window.AuthGuard.requireLogin();</script>



<script>
  document.addEventListener('DOMContentLoaded', function() {
    if (window.i18nInit) window.i18nInit();
  });
  // sync ภาษาอัตโนมัติข้ามแท็บ/ข้ามหน้า
  window.addEventListener('storage', function(e) {
    if (e.key === 'lang') {
      if (window.i18nInit) window.i18nInit();
    }
  });
</script>
</body>
</html>
