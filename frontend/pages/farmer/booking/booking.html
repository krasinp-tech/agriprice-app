<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />





  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title data-i18n="booking_title_page">การจอง | AGRIPRICE</title>
  <script>
    (function () {
      const savedTheme = localStorage.getItem('agriprice_theme') || ((window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
    <meta name="theme-color" content="#0B853C">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="stylesheet" href="../../../css/global.css" />
   <link rel="stylesheet" href="../../../components/bottom-nav/bottom-nav.css" />
  <link rel="stylesheet" href="../../../css/farmer/booking/booking.css" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">


    <script src="../../../js/permission-manager.js"></script>
  <link rel="stylesheet" href="../../../css/dark-mode-patch.css">
</head>

<body data-active="booking">
  <main class="page-shell">

    <!-- Header Section -->
    <section class="booking-header">
      <h1 class="booking-title" data-i18n="booking_title">การจอง</h1>
      <p class="booking-subtitle" data-i18n="booking_subtitle_farmer">รายการจองคิวของเกษตรกร</p>
    </section>

    <section class="controls">
      <div class="segmented" role="tablist" aria-label="ตัวกรองการจอง" data-i18n-aria-label="booking_filter_label">
        <button class="seg-btn active" data-filter="all" data-i18n="all">ทั้งหมด</button>
        <button class="seg-btn" data-filter="waiting" data-i18n="waiting">รออยู่</button>
        <button class="seg-btn" data-filter="success" data-i18n="success">สำเร็จ</button>
        <button class="seg-btn" data-filter="cancel" data-i18n="cancel">ยกเลิก</button>
      </div>

      <div class="searchbox">
        <span class="material-icons-outlined">search</span>
        <input id="searchInput" type="text" placeholder="ค้นหาด้วยเลขจอง / ร้าน / คิว" data-i18n-placeholder="booking_search_placeholder" />
      </div>
    </section>

    <section class="list" id="bookingList">
      <div class="shimmer" style="height: 140px; border-radius: 20px; margin-bottom: 12px;"></div>
      <div class="shimmer" style="height: 140px; border-radius: 20px; margin-bottom: 12px;"></div>
    </section>

    <div class="empty" id="emptyState" hidden>
      <div class="empty-card">
        <div class="empty-emoji"><span class="material-icons-outlined" aria-hidden="true">receipt_long</span></div>
        <div class="empty-title" data-i18n="booking_empty_title">ไม่พบรายการที่ตรงกับเงื่อนไข</div>
        <div class="empty-desc" data-i18n="booking_empty_desc">ลองเปลี่ยนตัวกรอง หรือพิมพ์ค้นหาใหม่อีกครั้ง</div>
      </div>
    </div>
  </main>

  <!-- Bottom Nav (component) -->
  <div id="bottomNavMount"></div>

  <!-- Core Scripts -->

    <script src="../../../js/config.js"></script>

    <script src="../../../js/utils/storage-keys.js"></script>

    <script src="../../../js/api-client.js"></script>

    <script src="../../../js/auth/guard.js"></script>
  <script>window.AuthGuard.requireLogin();</script>

  <!-- Component & Page Scripts -->

    <script src="../../../js/global-anim.js"></script>

    <script src="../../../js/components/i18n.js"></script>

    <script src="../../../js/components.js"></script>

    <script src="../../../js/utils/booking-search-guess.js"></script>
    <script src="../../../js/realtime-client.js"></script>
    <script src="../../../js/farmer/booking/booking.js"></script>



<script>
  document.addEventListener('DOMContentLoaded', function() {
    if (window.i18nInit) window.i18nInit();
  });

</script>
</body>
</html>
