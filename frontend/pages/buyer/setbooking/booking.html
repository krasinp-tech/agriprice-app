<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />


    <script src="../../../js/components/i18n.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title data-i18n="booking_title_page">การจอง | AGRIPRICE</title>
  <script>
    (function () {
      const savedTheme = localStorage.getItem('agriprice_theme') || ((window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
    <meta name="theme-color" content="#0B853C">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="stylesheet" href="../../../css/global.css" />
   <link rel="stylesheet" href="../../../components/bottom-nav/bottom-nav.css" />
  <link rel="stylesheet" href="../../../css/buyer/setbooking/booking.css" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

    <script src="../../../js/global-anim.js"></script>

    <script src="../../../js/permission-manager.js"></script>
  <link rel="stylesheet" href="../../../css/dark-mode-patch.css">
</head>

<body data-active="booking">
  <main class="page-shell">

    <!-- Header Section -->
    <section class="booking-header">
      <h1 class="booking-title" data-i18n="booking_title">การจอง</h1>
      <p class="booking-subtitle" data-i18n="booking_subtitle_buyer">รายการการจอง</p>
    </section>

    <section class="controls">
      <div class="segmented" role="tablist" aria-label="ตัวกรองการจอง" data-i18n-aria-label="booking_filter_label">
        <button class="seg-btn active" data-filter="all" data-i18n="all">ทั้งหมด</button>
        <button class="seg-btn" data-filter="waiting" data-i18n="waiting">รอคิว</button>
        <button class="seg-btn" data-filter="success" data-i18n="success">สำเร็จ</button>
        <button class="seg-btn" data-filter="cancel" data-i18n="cancel">ยกเลิก</button>
      </div>

      <div class="searchbox">
        <span class="material-icons-outlined">search</span>
        <input id="searchInput" type="text" placeholder="ค้นหาด้วยเลขจอง / ร้าน / คิว" data-i18n-placeholder="booking_search_placeholder" />
      </div>
    </section>

    <section class="list" id="bookingList">
      <div class="shimmer" style="height: 140px; border-radius: 20px; margin-bottom: 12px;"></div>
      <div class="shimmer" style="height: 140px; border-radius: 20px; margin-bottom: 12px;"></div>
    </section>

    <div class="empty" id="emptyState" hidden>
      <div class="empty-card">
        <div class="empty-emoji"><span class="material-icons-outlined" aria-hidden="true">receipt_long</span></div>
        <div class="empty-title" data-i18n="booking_empty_title">ยังไม่มีรายการจองที่ตรงกับเงื่อนไข</div>
        <div class="empty-desc" data-i18n="booking_empty_desc">ลองเปลี่ยนตัวกรอง หรือพิมพ์ค้นหาใหม่อีกครั้ง</div>
      </div>
    </div>
  </main>

  <!-- QR Scan Button (corner) -->
  <button id="scanBtn" class="scan-btn" aria-label="สแกนคิว QR" data-i18n-aria-label="scan_qr_queue" data-i18n-title="scan_qr_queue">
    <span class="material-icons-outlined">qr_code_scanner</span>
  </button>

  <!-- Native Scan Overlay -->
  <div id="scanModal" class="scan-modal" aria-hidden="true">
    <div class="scan-viewfinder">
      <div class="scan-header">
        <h2 data-i18n="scan_booking_qr">สแกน QR รหัสการจอง</h2>
        <button id="closeScanBtn" class="scan-close-btn" aria-label="ปิด" data-i18n-aria-label="close"><span class="material-icons-outlined">close</span></button>
      </div>

      <div class="viewfinder-box">
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>
        <div class="scan-line"></div>
      </div>

      <div class="scan-footer">
        <button id="torchBtn" class="torch-btn">
          <span class="material-icons-outlined">flashlight_on</span>
          <span data-i18n="torch">เปิดไฟ</span>
        </button>
        <div class="scan-hint" data-i18n="scan_hint">วางรหัส QR ให้อยู่ในกรอบเพื่อสแกน</div>
      </div>

      <div class="manual-input-box">
        <input id="scanManualInput" placeholder="กรอกรหัสการจอง" data-i18n-placeholder="manual_booking_code_placeholder" />
        <button id="scanManualBtn" class="btn-manual" data-i18n="confirm">ตกลง</button>
      </div>
    </div>
  </div>

  <!-- Bottom Nav (component) -->
  <div id="bottomNavMount"></div>

  <!-- Core Scripts -->

    <script src="../../../js/config.js"></script>

    <script src="../../../js/utils/storage-keys.js"></script>

    <script src="../../../js/api-client.js"></script>

    <script src="../../../js/auth/guard.js"></script>
  <script>window.AuthGuard.requireLogin();</script>

  <!-- Component & Page Scripts -->


    <script src="../../../js/components/ui-common.js"></script>

    <script src="../../../js/components/escape-html.js"></script>

    <script src="../../../js/components.js"></script>

    <script src="../../../js/utils/booking-search-guess.js"></script>
    <script src="../../../js/realtime-client.js"></script>
    <script src="../../../js/buyer/setbooking/booking.js"></script>



<script>
  document.addEventListener('DOMContentLoaded', function() {
    if (window.i18nInit) window.i18nInit();
  });

</script>
</body>
</html>
