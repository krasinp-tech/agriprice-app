<script>
document.addEventListener('DOMContentLoaded', function() {
    if (window.i18nInit) window.i18nInit();

    // --- Tab switching ---
    const tabs = document.querySelectorAll('.profile-tab[data-tab]');
    const panels = document.querySelectorAll('.tab-panel-new');
    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            tabs.forEach(t => t.classList.remove('active'));
            panels.forEach(p => p.classList.remove('active'));
            tab.classList.add('active');
            const panel = document.getElementById('tab-' + tab.dataset.tab);
            if (panel) panel.classList.add('active');
        });
    });

    // --- Make images clickable to trigger hidden file inputs ---
    const heroImage  = document.getElementById('heroImage');
    const coverInput = document.getElementById('coverInput');
    if (heroImage && coverInput) heroImage.addEventListener('click', () => coverInput.click());

    const profileAvatarBox = document.querySelector('.profile-avatar-box');
    const avatarInput      = document.getElementById('avatarInput');
    if (profileAvatarBox && avatarInput) profileAvatarBox.addEventListener('click', () => avatarInput.click());
});

// Called by myprofile.js after profile data is loaded
window.onProfileDataReady = function(profileData) {
    // --- Render contact tab (Frame 15) ---
    const contactList = document.getElementById('contactList');
    if (contactList) {
        const items = [];
        if (profileData.phone) items.push(`
            <div class="contact-item-row">
                <span class="material-icons-outlined">phone</span>
                <a href="tel:${profileData.phone}">${profileData.phone}</a>
            </div>`);
        if (profileData.email) items.push(`
            <div class="contact-item-row">
                <span class="material-icons-outlined">email</span>
                <a href="mailto:${profileData.email}">${profileData.email}</a>
            </div>`);
        if (profileData.links && profileData.links.length) {
            profileData.links.forEach(l => {
                items.push(`
                    <div class="contact-item-row">
                        <span class="material-icons-outlined">language</span>
                        <a href="${l}" target="_blank" rel="noopener">${l}</a>
                    </div>`);
            });
        }
        contactList.innerHTML = items.length ? items.join('') : `<p style="color:#aaa;font-size:14px;padding:16px 0;" data-i18n="no_contact_info">${window.i18nT ? window.i18nT('no_contact_info', 'ยังไม่มีข้อมูลติดต่อ') : 'ยังไม่มีข้อมูลติดต่อ'}</p>`;
    }

    // --- Render services tab (Frame 16) ---
    const servicesList = document.getElementById('servicesList');
    if (servicesList) {
        const iconMap = {
            'รับซื้อถึงสวน': 'local_shipping',
            'จ่ายเงินสด':    'payments',
            'จองคิวล่วงหน้า': 'event_available',
        };
        const svcs = (profileData.services && profileData.services.length) ? profileData.services : [];
        if (svcs.length === 0) {
            servicesList.innerHTML = `<div style="color:#94a3b8; font-size:13px; padding:10px 0;" data-i18n="no_services_info">${window.i18nT ? window.i18nT('no_services_info', 'ยังไม่ได้ระบุบริการ') : 'ยังไม่ได้ระบุบริการ'}</div>`;
        } else {
            servicesList.innerHTML = svcs.map(s => {
                const sName = typeof s === 'string' ? s : (s.name || '');
                return `
                <div class="service-row">
                    <span class="material-icons-outlined">${iconMap[sName] || 'check_circle'}</span>
                    <span>${sName}</span>
                </div>`;
            }).join('');
        }
    }
};
</script>
