<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Dashboard | AGRIPRICE</title>

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="../../../css/global.css" />
  <link rel="stylesheet" href="../../../components/bottom-nav/bottom-nav.css" />
  <link rel="stylesheet" href="../../../css/buyer/Dashboard/Dashboard1.css" />
  <script src="../../../js/global-anim.js"></script>
  <script src="../../../js/permission-manager.js"></script>
</head>

<body data-active="account" data-auth="required">
  
  <!-- Header -->
  <header class="dash-header">
    <button class="back-btn" id="backBtn" aria-label="ย้อนกลับ">
      <span class="material-icons-outlined">arrow_back</span>
    </button>
    <h1 class="dash-title">Dashboard</h1>
    <button class="refresh-btn" id="refreshBtn" aria-label="รีเฟรช">
      <span class="material-icons-outlined">refresh</span>
    </button>
  </header>

  <!-- Main Content -->
  <main class="dash-main">
    
    <!-- Period Filter -->
    <section class="period-selector">
      <button class="period-tab active" data-period="7">7 วัน</button>
      <button class="period-tab" data-period="30">30 วัน</button>
      <button class="period-tab" data-period="90">3 เดือน</button>
      <button class="period-tab" data-period="365">1 ปี</button>
    </section>

    <!-- KPI Cards -->
    <section class="kpi-section">
      <div class="kpi-card">
        <span class="material-icons-outlined kpi-icon">shopping_cart</span>
        <div class="kpi-content">
          <div class="kpi-value" id="totalOrders">0</div>
          <div class="kpi-label">คำสั่งซื้อทั้งหมด</div>
        </div>
      </div>

      <div class="kpi-card">
        <span class="material-icons-outlined kpi-icon">payments</span>
        <div class="kpi-content">
          <div class="kpi-value" id="totalSpent">฿0</div>
          <div class="kpi-label">ยอดใช้จ่ายรวม</div>
        </div>
      </div>

      <div class="kpi-card">
        <span class="material-icons-outlined kpi-icon">inventory_2</span>
        <div class="kpi-content">
          <div class="kpi-value" id="totalProducts">0</div>
          <div class="kpi-label">สินค้าที่ซื้อ</div>
        </div>
      </div>

      <div class="kpi-card">
        <span class="material-icons-outlined kpi-icon">trending_up</span>
        <div class="kpi-content">
          <div class="kpi-value" id="avgPrice">฿0</div>
          <div class="kpi-label">ราคาเฉลี่ย</div>
        </div>
      </div>
    </section>

    <!-- Chart Section -->
    <section class="chart-section">
      <div class="section-header">
        <h2>แนวโน้มการซื้อ</h2>
        <select class="chart-type" id="chartType">
          <option value="line">กราฟเส้น</option>
          <option value="bar">กราฟแท่ง</option>
        </select>
      </div>
      <div class="chart-container">
        <canvas id="purchaseChart"></canvas>
      </div>
    </section>

    <!-- Top Products -->
    <section class="top-section">
      <div class="section-header">
        <h2>สินค้าที่ซื้อบ่อย</h2>
        <a href="#" class="see-all">ดูทั้งหมด</a>
      </div>
      <div class="top-list" id="topProducts">
        <!-- Generated by JS -->
      </div>
    </section>

    <!-- Top Sellers -->
    <section class="top-section">
      <div class="section-header">
        <h2>ผู้ขายที่ติดต่อบ่อย</h2>
        <a href="#" class="see-all">ดูทั้งหมด</a>
      </div>
      <div class="seller-list" id="topSellers">
        <!-- Generated by JS -->
      </div>
    </section>

    <!-- Market Prices -->
    <section class="top-section">
      <div class="section-header">
        <h2>ราคากลางล่าสุด</h2>
        <a href="../../../gov-price-lookup.html" class="see-all">ดูทั้งหมด</a>
      </div>
      <div class="market-list" id="marketPrices">
        <!-- Generated by JS -->
      </div>
    </section>

    <!-- Booking Stats -->
    <section class="stats-section">
      <div class="section-header">
        <h2>สถานะการจอง</h2>
      </div>
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-circle waiting">
            <span class="stat-percent" id="waitingPercent">0%</span>
          </div>
          <div class="stat-info">
            <div class="stat-count" id="waitingCount">0</div>
            <div class="stat-name">รอดำเนินการ</div>
          </div>
        </div>
        <div class="stat-item">
          <div class="stat-circle success">
            <span class="stat-percent" id="successPercent">0%</span>
          </div>
          <div class="stat-info">
            <div class="stat-count" id="successCount">0</div>
            <div class="stat-name">สำเร็จ</div>
          </div>
        </div>
        <div class="stat-item">
          <div class="stat-circle cancel">
            <span class="stat-percent" id="cancelPercent">0%</span>
          </div>
          <div class="stat-info">
            <div class="stat-count" id="cancelCount">0</div>
            <div class="stat-name">ยกเลิก</div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- Bottom Nav -->
  <div id="bottomNavMount"></div>

  <!-- Scripts -->
  <script src="../../../js/config.js"></script>
  <script src="../../../js/api-client.js"></script>
  <script src="../../../js/auth/guard.js"></script>
  <script>window.AuthGuard.requireLogin();</script>
  <script src="../../../js/components.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="../../../js/buyer/Dashboard/Dashboard1.js"></script>
</body>
</html>
