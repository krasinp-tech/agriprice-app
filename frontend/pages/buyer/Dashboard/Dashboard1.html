<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Dashboard | AGRIPRICE</title>

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="../../../css/global.css" />
  <link rel="stylesheet" href="../../../components/bottom-nav/bottom-nav.css" />
  <link rel="stylesheet" href="../../../css/buyer/Dashboard/Dashboard1.css" />
  <script src="../../../js/global-anim.js"></script>
  <script src="../../../js/permission-manager.js"></script>
<meta name="theme-color" content="#f8f9fa">
</head>

<body data-active="account" data-auth="required">
  
  <!-- Header -->
  <div class="dashboard-header-bg">
    <button class="back-btn-light" id="backBtn" aria-label="ย้อนกลับ">
      <span class="material-icons-outlined">arrow_back_ios</span>
    </button>
    <div class="header-titles">
      <h1>Dashboard</h1>
      <p>ยินดีต้อนรับกลับ, สิงกนก</p>
    </div>
  </div>

  <!-- Main Content -->
  <main class="dash-main-pro">
    
    <!-- Period Filter -->
    <section class="period-selector-pro">
      <button class="period-tab active" data-period="today">วันนี้</button>
      <button class="period-tab" data-period="week">สัปดาห์</button>
      <button class="period-tab" data-period="month">เดือน</button>
    </section>

    <!-- KPI Cards -->
    <section class="kpi-grid">
      <div class="kpi-card">
        <div class="icon-circle icon-green">
          <span class="material-icons-outlined">attach_money</span>
        </div>
        <div class="kpi-label">รายได้รายเดือน</div>
        <div class="kpi-value" id="monthlyRevenue">฿45,280</div>
        <div class="kpi-trend trend-up">+12.5% จากเดือนที่แล้ว</div>
      </div>

      <div class="kpi-card">
        <div class="icon-circle icon-blue">
          <span class="material-icons-outlined">work_outline</span>
        </div>
        <div class="kpi-label">ยอดจองทั้งหมด</div>
        <div class="kpi-value" id="totalBookings">127</div>
        <div class="kpi-trend trend-blue">+8.2% สัปดาห์นี้</div>
      </div>

      <div class="kpi-card">
        <div class="icon-circle icon-orange">
          <span class="material-icons-outlined">visibility</span>
        </div>
        <div class="kpi-label">ยอดเข้าชมทั้งหมด</div>
        <div class="kpi-value" id="totalViews">3,842</div>
        <div class="kpi-trend trend-orange">+24.1% เดือนนี้</div>
      </div>

      <div class="kpi-card">
        <div class="icon-circle icon-green">
          <span class="material-icons-outlined">face</span>
        </div>
        <div class="kpi-label">ผู้ติดตามใหม่</div>
        <div class="kpi-value" id="newFollowers">18</div>
        <div class="kpi-trend trend-up">+26.3% จากเดือนที่แล้ว</div>
      </div>
    </section>

    <!-- Booking Summary Chart -->
    <section class="summary-section">
      <div class="section-header">
        <h2>สรุปการจอง</h2>
      </div>
      <div class="chart-container-donut">
        <canvas id="bookingSummaryChart"></canvas>
        <div class="chart-center-text">
          <span class="center-label">ทั้งหมด</span>
          <span class="center-value">127</span>
          <span class="center-label">รายการ</span>
        </div>
      </div>
      <div class="chart-legend">
        <div class="legend-item">
          <div class="legend-color" style="background: #10b981;"></div>
          <span class="legend-label">สำเร็จ</span>
          <span class="legend-value">78</span>
        </div>
      </div>
    </section>

  </main>

  <!-- Bottom Nav -->
  <div id="bottomNavMount"></div>

  <!-- Scripts -->
  <script src="../../../js/config.js"></script>
  <script src="../../../js/api-client.js"></script>
  <script src="../../../js/auth/guard.js"></script>
  <script>window.AuthGuard.requireLogin();</script>
  <script src="../../../js/components.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="../../../js/buyer/Dashboard/Dashboard1.js"></script>
</body>
</html>
