<!DOCTYPE html>
<html lang="th">
<head>
  <script src="../../js/config.js"></script>
  <script src="../../js/api-client.js"></script>
  <script src="../../js/auth/guard.js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title data-i18n="set_password_title">ตั้งรหัสผ่าน | Agriprice</title>
  <meta name="theme-color" content="#0B853C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="../../css/global.css" />
  <link rel="stylesheet" href="../../css/auth/register4.css" />
  <link rel="stylesheet" href="../../css/dark-mode-patch.css">
  
  <script>
    (function () {
      const savedTheme = localStorage.getItem('agriprice_theme') || ((window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
</head>

<body>
  <main class="screen" role="main" aria-label="Agriprice Register Step 4 Password" data-i18n-aria-label="auth_register_step4_password_label">
    <section class="card">

      <!-- TOP MEDIA AREA -->
      <div class="media" aria-label="Password media" data-i18n-aria-label="auth_password_media_label">
        <video
          id="registerVideo"
          class="media-video"
          autoplay
          muted
          loop
          playsinline
          preload="metadata"
          controlslist="nodownload noplaybackrate noremoteplayback"
          disablepictureinpicture
        >
          <source src="../../assets/videos/password-setup.mp4" type="video/mp4" />
        </video>
        <div class="media-fallback" id="mediaFallback" aria-hidden="true"></div>
      </div>

      <!-- CONTENT SHEET -->
      <div class="content">
        <header class="head">
          <h1 class="h1" data-i18n="set_password_title">กรุณาตั้งรหัสผ่านสำหรับเข้าใช้งานระบบ</h1>
        </header>

        <form class="form" id="registerForm" novalidate>
          <div class="field">
            <label class="label" for="password" data-i18n="new_password_label">รหัสผ่านใหม่</label>
            <div class="input-wrap">
              <input
                class="input input-password"
                id="password"
                name="password"
                type="password"
                autocomplete="new-password"
              placeholder="อย่างน้อย 8 ตัวอักษร" data-i18n-placeholder="password_min_placeholder"
                minlength="8"
                required
              />
              <button class="eye" id="togglePw1" type="button" aria-label="แสดง/ซ่อน รหัสผ่านใหม่" data-i18n-aria-label="toggle_password_visibility">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" stroke="currentColor" stroke-width="1.8" />
                  <path d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4Z" stroke="currentColor" stroke-width="1.8" />
                </svg>
              </button>
            </div>
          </div>

          <div class="field">
            <label class="label" for="confirmPassword" data-i18n="confirm_password_label">ยืนยันรหัสผ่าน</label>
            <div class="input-wrap">
              <input
                class="input input-password"
                id="confirmPassword"
                name="confirmPassword"
                type="password"
                autocomplete="new-password"
              placeholder="กรุณากรอกรหัสผ่านอีกครั้ง" data-i18n-placeholder="confirm_password_placeholder"
                minlength="8"
                required
              />
              <button class="eye" id="togglePw2" type="button" aria-label="แสดง/ซ่อน ยืนยันรหัสผ่าน" data-i18n-aria-label="toggle_password_visibility">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" stroke="currentColor" stroke-width="1.8" />
                  <path d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4Z" stroke="currentColor" stroke-width="1.8" />
                </svg>
              </button>
            </div>
          </div>

          <button class="btn" id="finishBtn" type="submit">
            <span class="btn-text" data-i18n="login_btn">เข้าสู่ระบบ</span>
            <span class="btn-spinner" aria-hidden="true"></span>
          </button>
        </form>
      </div>

    </section>
  </main>

  <script src="../../js/components/i18n.js"></script>
  <script src="../../js/auth/register4.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (window.i18nInit) window.i18nInit();
    });
  </script>
</body>
</html>
