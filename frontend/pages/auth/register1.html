<!DOCTYPE html>
<html lang="th">
<head>
  <script src="../../js/config.js"></script>
  <script src="../../js/api-client.js"></script>
  <script src="../../js/auth/guard.js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title data-i18n="register_now">สมัครสมาชิก | Agriprice</title>
  <meta name="theme-color" content="#0B853C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="../../css/global.css" />
  <link rel="stylesheet" href="../../css/auth/register1.css" />
  <link rel="stylesheet" href="../../css/dark-mode-patch.css">
  
  <script>
    (function () {
      const savedTheme = localStorage.getItem('agriprice_theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
</head>

<body>
  <main class="screen" role="main" aria-label="Agriprice Register Step 1">
    <section class="card">

      <!-- TOP MEDIA AREA -->
      <div class="media" aria-label="Register media">
        <video
          id="registerVideo"
          class="media-video"
          autoplay
          muted
          loop
          playsinline
          preload="auto"
          controlslist="nodownload noplaybackrate noremoteplayback"
          disablepictureinpicture
        >
          <!-- <source id="topVideoSource" src="../../assets/video/agripricenav.mp4" type="video/mp4" /> -->
        </video>
        <div class="media-fallback" id="mediaFallback" aria-hidden="true"></div>
      </div>

      <!-- CONTENT SHEET -->
      <div class="content">
        <header class="head">
          <h1 class="h1" data-i18n="select_role_title">กรุณาเลือกประเภทผู้ใช้งานของคุณ</h1>
          <p class="subtitle" data-i18n="select_role_sub">เลือกประเภทผู้ใช้เพื่อให้ระบบตั้งค่าการใช้งานที่เหมาะสม</p>
        </header>

        <!-- ROLE CARDS -->
        <section class="role-grid" aria-label="เลือกประเภทผู้ใช้">

          <!-- Farmer -->
          <button class="role-card" type="button" data-role="farmer" aria-pressed="false" id="roleFarmer">
            <div class="role-illus" aria-hidden="true">
              <video
                class="role-video"
                autoplay
                muted
                loop
                playsinline
                preload="auto"
                controlslist="nodownload noplaybackrate noremoteplayback"
                disablepictureinpicture
                tabindex="-1"
              >
                <!-- <source src="../../assets/video/agripricenav.mp4" type="video/mp4" /> -->
              </video>
            </div>
            <div class="role-name" data-i18n="role_farmer_name">เกษตรกร</div>
            <div class="role-desc" data-i18n="role_farmer_desc">สำหรับผู้ผลิตหรือเจ้าของผลผลิตทางการเกษตร</div>
          </button>

          <!-- Buyer -->
          <button class="role-card" type="button" data-role="buyer" aria-pressed="false" id="roleBuyer">
            <div class="role-illus" aria-hidden="true">
              <video
                class="role-video"
                autoplay
                muted
                loop
                playsinline
                preload="auto"
                controlslist="nodownload noplaybackrate noremoteplayback"
                disablepictureinpicture
                tabindex="-1"
              >
                <!-- <source src="../../assets/video/agripricenav.mp4" type="video/mp4" /> -->
              </video>
            </div>
            <div class="role-name" data-i18n="role_buyer_name">ผู้รับซื้อ</div>
            <div class="role-desc" data-i18n="role_buyer_desc">สำหรับผู้รับซื้อหรือผู้ประกอบการรับซื้อผลผลิต</div>
          </button>

        </section>

        <!-- ACTIONS -->
        <div class="actions">
          <button class="btn" id="nextBtn" type="button" disabled data-i18n="next_btn">ถัดไป</button>
          <p class="hint" id="hintText" aria-live="polite"></p>
        </div>

      </div>
    </section>
  </main>

  <!-- CONFIRM MODAL -->
  <div class="modal" id="confirmModal" aria-hidden="true">
    <div class="modal-backdrop" data-close="true"></div>
    <div class="modal-sheet" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-icon" aria-hidden="true">
        <span class="check"></span>
      </div>

      <h2 class="modal-title" id="modalTitle" data-i18n="confirm_reg_title">ยืนยันการสมัครสมาชิก</h2>
      <p class="modal-text" id="modalText" data-i18n="confirm_reg_text">คุณต้องการสมัครเป็น…</p>

      <div class="modal-actions">
        <button class="m-btn m-ghost" id="cancelBtn" type="button" data-i18n="cancel">ยกเลิก</button>
        <button class="m-btn m-primary" id="confirmBtn" type="button" data-i18n="confirm">ยืนยัน</button>
      </div>
    </div>
  </div>

  <script src="../../js/components/i18n.js"></script>
  <script src="../../js/auth/register1.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (window.i18nInit) window.i18nInit();
    });
  </script>
</body>
</html>
