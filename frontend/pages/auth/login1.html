  <!-- Auto-login: Redirect if already logged in -->
  <script>
    (function() {
      // Persist 'next' param to sessionStorage immediately
      const params = new URLSearchParams(window.location.search);
      const nextParam = params.get('next');
      if (nextParam && nextParam !== 'undefined' && nextParam !== 'null') {
        sessionStorage.setItem('redirectAfterAuth', nextParam);
        if (window.AGRIPRICE_DEBUG) console.log('[Login1] Persisted redirect target:', nextParam);
      }

      const checkLoggedIn = () => {
        // Robust check for token and role
        const token = localStorage.getItem('token');
        const role = String(localStorage.getItem('role') || 'guest').toLowerCase();
        const isLoggedIn = !!token && role !== 'guest' && role !== 'null' && role !== 'undefined';

        if (isLoggedIn) {
           if (window.AGRIPRICE_DEBUG) console.log('[Login1] User is already logged in, redirecting...');
           const params = new URLSearchParams(window.location.search);
           const next = params.get('next') || sessionStorage.getItem('redirectAfterAuth');
           sessionStorage.removeItem('redirectAfterAuth');
           
           if (next && next !== 'undefined' && next !== 'null') {
             window.location.href = next;
           } else {
             window.location.href = '../../index.html';
           }
           return true;
        }
        return false;
      };
      
      // Run immediately
      if (!checkLoggedIn()) {
        // Also run on DOMContentLoaded just in case
        document.addEventListener('DOMContentLoaded', checkLoggedIn);
      }
    })();
  </script>
