<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title data-i18n="forgot_pwd_title">ลืมรหัสผ่าน | Agriprice</title>
  <script>
    (function () {
      const savedTheme = localStorage.getItem('agriprice_theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
    <meta name="theme-color" content="#0B853C">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/global.css" />
  <link rel="stylesheet" href="../../css/auth/forgot-password.css" />
  <link rel="stylesheet" href="../../css/dark-mode-patch.css">
</head>
<body>
  <main class="screen">
    <section class="card">
      <div class="content">
        <header class="head">
          <h1 class="h1" id="stepTitle" data-i18n="forgot_pwd_title">ลืมรหัสผ่าน?</h1>
          <p class="sub" id="stepSub" data-i18n="forgot_pwd_sub">ไม่ต้องกังวล เราจะช่วยคุณกู้คืนบัญชี</p>
        </header>

        <div id="step1">
          <div class="field">
            <label class="label" data-i18n="phone_label">เบอร์โทรศัพท์</label>
            <input id="phoneInput" class="input" type="tel" placeholder="0XXXXXXXXX" maxlength="10" />
          </div>
          <button class="btn btn-primary" id="btnSendOTP">
            <span class="btn-text" data-i18n="send_otp_btn">ส่งรหัส OTP</span>
          </button>
        </div>

        <div id="step2" hidden>
          <div class="field">
            <label class="label">OTP</label>
            <input id="otpInput" class="input" type="tel" placeholder="••••••" maxlength="6" />
          </div>
          <button class="btn btn-primary" id="btnVerifyOTP">
            <span class="btn-text" data-i18n="verify_otp_btn">ยืนยันรหัส OTP</span>
          </button>
          <p class="foot-text"><span data-i18n="no_account_yet">ไม่ได้รับรหัส?</span> <button class="link-btn" id="btnResendOTP" data-i18n="resend_otp">ส่งอีกครั้ง</button></p>
        </div>

        <div id="step3" hidden>
          <div class="field">
            <label class="label" data-i18n="new_password_label">รหัสผ่านใหม่</label>
            <input id="newPassword" class="input" type="password" placeholder="••••••••" />
          </div>
          <div class="field">
            <label class="label" data-i18n="confirm_password_label">ยืนยันรหัสผ่าน</label>
            <input id="confirmPassword" class="input" type="password" placeholder="••••••••" />
          </div>
          <button class="btn btn-primary" id="btnResetPassword">
            <span class="btn-text" data-i18n="save">ตั้งรหัสผ่านใหม่</span>
          </button>
        </div>

        <div id="stepSuccess" hidden>
          <h2 class="h2" data-i18n="reset_success_title">เปลี่ยนรหัสผ่านสำเร็จ</h2>
          <p class="sub text-center" data-i18n="reset_success_sub">คุณสามารถใช้รหัสผ่านใหม่เข้าสู่ระบบได้ทันที</p>
          <button class="btn btn-primary" onclick="window.location.href='./login2.html'">
            <span class="btn-text" data-i18n="go_to_login">ไปที่หน้าเข้าสู่ระบบ</span>
          </button>
        </div>
      </div>
    </section>
  </main>
  <div id="recaptcha-container"></div>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <script src="../../js/components/i18n.js"></script>
  <script src="../../js/api-client.js"></script>
  <script src="../../js/auth/forgot-password.js"></script>
</body>
</html>
