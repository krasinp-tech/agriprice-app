<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title data-i18n="forgot_pwd_title">ลืมรหัสผ่าน | Agriprice</title>
  <script>
    (function () {
      const savedTheme = localStorage.getItem('agriprice_theme') || ((window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
  <meta name="theme-color" content="#0B853C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="../../css/global.css" />
  <link rel="stylesheet" href="../../css/auth/forgot-password.css" />
  <link rel="stylesheet" href="../../css/dark-mode-patch.css">
</head>
<body>
  <main class="screen">
    <section class="card">

      <!-- TOP MEDIA AREA (Matches Login & Register design language) -->
      <div class="media" aria-label="Forgot password media" data-i18n-aria-label="auth_forgot_password_media_label">
        <button class="back-btn" id="btnBackToLogin" aria-label="ย้อนกลับ" data-i18n-aria-label="back">
          <span class="material-icons-outlined" style="color: #fff; font-size: 24px;">arrow_back</span>
        </button>
        <video id="loginVideo" class="media-video" autoplay muted loop playsinline preload="metadata"
          controlslist="nodownload noplaybackrate noremoteplayback"
          disablepictureinpicture></video>
        <div class="media-fallback" id="mediaFallback" aria-hidden="true"></div>
      </div>

      <!-- CONTENT SHEET -->
      <div class="content">
        <header class="head">
          <h1 class="h1" id="stepTitle" data-i18n="forgot_pwd_title">ลืมรหัสผ่าน?</h1>
          <p class="sub" id="stepSub" data-i18n="forgot_pwd_sub">ไม่ต้องกังวล เราจะช่วยคุณกู้คืนบัญชี</p>
        </header>

        <!-- Step 1: Request OTP -->
        <div id="step1" class="auth-step active">
          <form id="formStep1" class="form">
            <div class="field">
              <label class="label" data-i18n="phone_label">เบอร์โทรศัพท์</label>
              <input id="phoneInput" class="input" type="tel" placeholder="0XXXXXXXXX" maxlength="10" required />
            </div>
            <div id="error1" class="error"></div>
            <button class="btn" id="btnSendOTP" type="submit">
              <span class="btn-text" data-i18n="send_otp_btn">ส่งรหัส OTP</span>
              <span class="btn-spinner"></span>
            </button>
          </form>
        </div>

        <!-- Step 2: Verify OTP -->
        <div id="step2" class="auth-step" hidden>
          <form id="formStep2" class="form">
            <div class="field" style="margin-bottom: 4px;">
              <label class="label" data-i18n="otp_sent_to">รหัส OTP ถูกส่งไปยังเบอร์</label>
              <p id="displayPhone" style="font-weight: 700; color: var(--navy); font-size: 16px; margin-top: 2px;">-</p>
            </div>

            <div class="field">
              <label class="label" data-i18n="otp_code_six_digits">รหัสยืนยัน OTP (6 หลัก)</label>
              <div class="otp-container">
                <input class="otp-input" type="tel" maxlength="1" required pattern="[0-9]" inputmode="numeric" />
                <input class="otp-input" type="tel" maxlength="1" required pattern="[0-9]" inputmode="numeric" />
                <input class="otp-input" type="tel" maxlength="1" required pattern="[0-9]" inputmode="numeric" />
                <input class="otp-input" type="tel" maxlength="1" required pattern="[0-9]" inputmode="numeric" />
                <input class="otp-input" type="tel" maxlength="1" required pattern="[0-9]" inputmode="numeric" />
                <input class="otp-input" type="tel" maxlength="1" required pattern="[0-9]" inputmode="numeric" />
              </div>
            </div>

            <div id="error2" class="error"></div>

            <button class="btn" id="btnVerifyOTP" type="submit">
              <span class="btn-text" data-i18n="verify_otp_btn">ยืนยันรหัส OTP</span>
              <span class="btn-spinner"></span>
            </button>

            <div id="timerContainer" style="display: none; align-items: center; justify-content: center; gap: 6px; font-size: 13px; color: var(--muted); margin-top: 6px;">
              <span class="material-icons-outlined" style="font-size: 16px;">schedule</span>
              <span><span data-i18n="resend_available_in">ส่งรหัสใหม่ได้ในอีก</span> <span id="timerText" style="font-weight: 700; color: var(--brand);">02:00</span> <span data-i18n="minutes">นาที</span></span>
            </div>

            <p class="foot" style="margin-top: 10px;">
              <span data-i18n="no_account_yet">ไม่ได้รับรหัส?</span>
              <button class="link-btn" id="btnResendOTP" type="button" data-i18n="resend_otp" disabled>ส่งอีกครั้ง</button>
            </p>
          </form>
        </div>

        <!-- Step 3: Reset Password -->
        <div id="step3" class="auth-step" hidden>
          <form id="formStep3" class="form">
            <div class="field">
              <label class="label" data-i18n="new_password_label">รหัสผ่านใหม่</label>
              <div class="input-wrap">
                <input id="newPassword" class="input input-password" type="password" placeholder="••••••••" required />
                <button class="eye" id="togglePwd1" type="button" aria-label="แสดง/ซ่อน รหัสผ่าน" data-i18n-aria-label="toggle_password_visibility">
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" stroke="currentColor" stroke-width="1.8" />
                    <path d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4Z" stroke="currentColor" stroke-width="1.8" />
                  </svg>
                </button>
              </div>
            </div>

            <div class="field">
              <label class="label" data-i18n="confirm_password_label">ยืนยันรหัสผ่านใหม่</label>
              <div class="input-wrap">
                <input id="confirmPassword" class="input input-password" type="password" placeholder="••••••••" required />
                <button class="eye" id="togglePwd2" type="button" aria-label="แสดง/ซ่อน รหัสผ่าน" data-i18n-aria-label="toggle_password_visibility">
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" stroke="currentColor" stroke-width="1.8" />
                    <path d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4Z" stroke="currentColor" stroke-width="1.8" />
                  </svg>
                </button>
              </div>
            </div>

            <div id="error3" class="error"></div>

            <button class="btn" id="btnResetPassword" type="submit">
              <span class="btn-text" data-i18n="save">ตั้งรหัสผ่านใหม่</span>
              <span class="btn-spinner"></span>
            </button>
          </form>
        </div>

        <!-- Success Screen -->
        <div id="stepSuccess" class="auth-step" hidden>
          <div class="success-content">
            <div class="success-icon">
              <span class="material-icons-outlined" style="font-size: 48px; color: var(--success);">check_circle</span>
            </div>
            <h2 class="h2" data-i18n="reset_success_title">เปลี่ยนรหัสผ่านสำเร็จ</h2>
            <p class="sub text-center" style="margin-bottom: 24px;" data-i18n="reset_success_sub">คุณสามารถใช้รหัสผ่านใหม่เข้าสู่ระบบได้ทันที</p>
            <button class="btn" id="btnBackToLoginSuccess">
              <span class="btn-text" data-i18n="go_to_login">ไปที่หน้าเข้าสู่ระบบ</span>
            </button>
          </div>
        </div>

      </div>
    </section>
  </main>
  <div id="recaptcha-container"></div>
  <script src="../../js/utils/firebase-compat-loader.js"></script>
  <script src="../../js/components/i18n.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/api-client.js"></script>
  <script src="../../js/auth/forgot-password.js"></script>
</body>
</html>
