<!doctype html>
<html lang="th">

<head>
  <meta charset="utf-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ลืมรหัสผ่าน | Agriprice</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/global.css" />
  <link rel="stylesheet" href="../../css/auth/forgot-password.css" />
  <script src="../../js/config.js"></script>
  <script src="../../js/api-client.js"></script>
  <script src="../../js/global-anim.js"></script>
  <script src="../../js/components/ui-common.js"></script>
  <link rel="stylesheet" href="../../css/dark-mode-patch.css">
</head>

<body>
  <main class="screen" role="main">
    <section class="card">
      <!-- TOP MEDIA AREA -->
      <div class="media">
        <video id="authVideo" class="media-video" autoplay muted loop playsinline preload="auto"
          poster="../../assets/images/story-1.jpg">
          <!-- <source src="../../assets/video/agripricenav.mp4" type="video/mp4" /> -->
        </video>
        <div class="media-fallback" id="mediaFallback"></div>
        <button class="back-btn" id="btnBackToLogin" aria-label="กลับหน้าเข้าสู่ระบบ">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M15 18l-6-6 6-6" stroke="white" stroke-width="2.5" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </button>
      </div>

      <!-- CONTENT SHEET -->
      <div class="content">
        <header class="head">
          <h1 class="h1" id="stepTitle">ลืมรหัสผ่าน?</h1>
          <p class="sub" id="stepSub">ไม่ต้องกังวล เราจะช่วยคุณกู้คืนบัญชี</p>
        </header>

        <!-- STEP 1: Phone Input -->
        <div id="step1" class="auth-step active">
          <form class="form" id="formStep1">
            <div class="field">
              <label class="label">เบอร์โทรศัพท์</label>
              <input id="phoneInput" class="input" type="tel" inputmode="tel" placeholder="0XXXXXXXXX" maxlength="10"
                required />
              <p class="help">ระบุเบอร์โทรศัพท์ที่ใช้สมัครสมาชิก</p>
            </div>
            <div class="error" id="error1"></div>
            <button class="btn" id="btnSendOTP" type="submit">
              <span class="btn-text">ส่งรหัส OTP</span>
              <span class="btn-spinner"></span>
            </button>
          </form>
        </div>

        <!-- STEP 2: OTP Input -->
        <div id="step2" class="auth-step">
          <form class="form" id="formStep2">
            <div class="field">
              <label class="label">รหัส OTP</label>
              <div class="otp-container">
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric" required>
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric" required>
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric" required>
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric" required>
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric" required>
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric" required>
              </div>
              <p class="help text-center">ส่งรหัสไปยัง <span id="displayPhone"></span></p>
            </div>
            <div id="error2"></div>
            <div id="recaptcha-container" style="display:flex; justify-content:center; margin:10px 0;"></div>
            <button class="btn" id="btnVerifyOTP" type="submit">
              <span class="btn-text">ยืนยันรหัส OTP</span>
              <span class="btn-spinner"></span>
            </button>
            <div id="timerContainer" style="display: none; justify-content: center; margin-top: 10px; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.6);">
              รหัสจะหมดอายุใน <span id="timerText" style="color: #fff; margin: 0 4px;">02:00</span> นาที
            </div>
            <p class="foot">
              ไม่ได้รับรหัส? <button class="link-btn" id="btnResendOTP" type="button">ส่งอีกครั้ง</button>
            </p>
          </form>
        </div>

        <!-- STEP 3: New Password Input -->
        <div id="step3" class="auth-step">
          <form class="form" id="formStep3">
            <div class="field">
              <label class="label">รหัสผ่านใหม่</label>
              <div class="input-wrap">
                <input id="newPassword" class="input" type="password" placeholder="รหัสผ่านใหม่ (อย่างน้อย 8 ตัว)"
                  required minlength="8" />
                <button class="eye" id="togglePwd1" type="button">
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" stroke="currentColor"
                      stroke-width="1.8" />
                    <path d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4Z" stroke="currentColor"
                      stroke-width="1.8" />
                  </svg>
                </button>
              </div>
            </div>
            <div class="field">
              <label class="label">ยืนยันรหัสผ่านใหม่</label>
              <div class="input-wrap">
                <input id="confirmPassword" class="input" type="password" placeholder="ยืนยันรหัสผ่านใหม่อีกครั้ง"
                  required />
                <button class="eye" id="togglePwd2" type="button">
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" stroke="currentColor"
                      stroke-width="1.8" />
                    <path d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4Z" stroke="currentColor"
                      stroke-width="1.8" />
                  </svg>
                </button>
              </div>
            </div>
            <div class="error" id="error3"></div>
            <button class="btn" id="btnResetPassword" type="submit">
              <span class="btn-text">ตั้งรหัสผ่านใหม่</span>
              <span class="btn-spinner"></span>
            </button>
          </form>
        </div>

        <!-- SUCCESS STEP -->
        <div id="stepSuccess" class="auth-step">
          <div class="success-content">
            <div class="success-icon">
              <svg width="64" height="64" viewBox="0 0 24 24" fill="none">
                <path d="M20 6L9 17L4 12" stroke="#148A3A" stroke-width="3" stroke-linecap="round"
                  stroke-linejoin="round" />
              </svg>
            </div>
            <h2 class="h2">เปลี่ยนรหัสผ่านสำเร็จ</h2>
            <p class="sub text-center">คุณสามารถใช้รหัสผ่านใหม่เข้าสู่ระบบได้ทันที</p>
            <button class="btn" id="btnBackToLoginSuccess">
              <span class="btn-text">ไปที่หน้าเข้าสู่ระบบ</span>
            </button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="../../js/auth/forgot-password.js"></script>
</body>

</html>
