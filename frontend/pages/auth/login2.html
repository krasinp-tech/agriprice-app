<!doctype html>
<html lang="th">

<head>
  <meta charset="utf-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title data-i18n="login_title">เข้าสู่ระบบ | Agriprice</title>
  <script>
    (function () {
      const savedTheme = localStorage.getItem('agriprice_theme') || ((window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
  <meta name="theme-color" content="#0B853C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/global.css" />

  <link rel="stylesheet" href="../../css/auth/login2.css" />

  <script src="../../js/components/i18n.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/api-client.js"></script>
  <script src="../../js/global-anim.js"></script>
  <script src="../../js/components/ui-common.js"></script>
  <script src="../../js/permission-manager.js"></script>
  <link rel="stylesheet" href="../../css/dark-mode-patch.css">
</head>

<body>
  <main class="screen" role="main" aria-label="Agriprice Login Screen" data-i18n-aria-label="auth_login_screen_label">
    <section class="card">

      <div class="media" aria-label="Login media" data-i18n-aria-label="auth_login_media_label">
        <video id="loginVideo" class="media-video" autoplay muted loop playsinline preload="metadata"
          controlslist="nodownload noplaybackrate noremoteplayback"
          disablepictureinpicture>
          <source src="../../assets/videos/video_20260717_035527_edit.mp4" type="video/mp4" />
        </video>
        <div class="media-fallback" id="mediaFallback" aria-hidden="true"></div>
      </div>

      <div class="content">
        <header class="head">
          <h1 class="h1" data-i18n="welcome_back">ยินดีต้อนรับกลับมา</h1>
          <p class="sub" data-i18n="login_subtitle">กรุณาเข้าสู่ระบบเพื่อใช้งานระบบ</p>
        </header>

        <form class="form" id="loginForm" novalidate>
          <div class="field">
            <label class="label" for="identifier" data-i18n="identifier_label">อีเมล / เบอร์โทรศัพท์</label>
            <input id="identifier" name="identifier" class="input" type="text" inputmode="text" autocomplete="username"
              placeholder="อีเมล / เบอร์โทรศัพท์" data-i18n-placeholder="identifier_label" required />
            <p class="help" id="idHelp"></p>
          </div>

          <div class="field">
            <label class="label" for="password" data-i18n="password_label">รหัสผ่าน</label>
            <div class="input-wrap">
              <input id="password" name="password" class="input input-password" type="password"
                autocomplete="current-password" placeholder="รหัสผ่าน" data-i18n-placeholder="password_label" required
                minlength="4" />
              <button class="eye" id="togglePwd" type="button" aria-label="แสดง/ซ่อน รหัสผ่าน" data-i18n-aria-label="toggle_password_visibility">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" stroke="currentColor" stroke-width="1.8" />
                  <path d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4Z" stroke="currentColor"
                    stroke-width="1.8" />
                </svg>
              </button>
            </div>
            <p class="help" id="pwHelp"></p>
          </div>

          <div class="error" id="formError" role="alert" aria-live="polite"></div>

          <button class="btn" id="loginBtn" type="submit">
            <span class="btn-text" data-i18n="login_btn">เข้าสู่ระบบ</span>
            <span class="btn-spinner" aria-hidden="true"></span>
          </button>

          <p class="foot">
            <a class="link strong" href="./forgot-password.html" id="goForgot"
              data-i18n="forgot_password_link">ลืมรหัสผ่าน?</a>
            <span style="margin-left:8px">|</span>
            <span data-i18n="no_account_yet">ยังไม่มีบัญชีใช่ไหม?</span>
            <a class="link strong" href="./register1.html" id="goRegister" data-i18n="register_now">สมัครสมาชิก</a>
          </p>
        </form>
      </div>

    </section>
  </main>

  <script src="../../js/auth/guard.js"></script>
  <script src="../../js/auth/login2.js"></script>
</body>

</html>
