<!DOCTYPE html>
<html lang="th">
<head>
  <script src="../../js/config.js"></script>
  <script src="../../js/api-client.js"></script>
  <script src="../../js/auth/guard.js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title data-i18n="register_now">สมัครสมาชิก | Agriprice</title>
  <meta name="theme-color" content="#0B853C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

  <link rel="stylesheet" href="../../css/global.css" />
  <link rel="stylesheet" href="../../css/auth/register2.css" />
  <link rel="stylesheet" href="../../css/dark-mode-patch.css">
  
  <script>
    (function () {
      const savedTheme = localStorage.getItem('agriprice_theme') || ((window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
</head>

<body>
  <main class="screen" role="main" aria-label="Agriprice Register Step 2" data-i18n-aria-label="auth_register_step2_label">
    <section class="card">

      <!-- TOP MEDIA AREA -->
      <div class="media" aria-label="Register media" data-i18n-aria-label="auth_register_media_label">
        <video
          id="registerVideo"
          class="media-video"
          autoplay
          muted
          loop
          playsinline
          preload="auto"
          controlslist="nodownload noplaybackrate noremoteplayback"
          disablepictureinpicture
        >
          <!-- <source id="topVideoSource" src="../../assets/video/agripricenav.mp4" type="video/mp4" /> -->
        </video>
        <div class="media-fallback" id="mediaFallback" aria-hidden="true"></div>
      </div>

      <!-- CONTENT SHEET -->
      <div class="content">
        <header class="head">
          <h1 class="h1" data-i18n="register_now">สมัครสมาชิก</h1>
          <p class="subtitle" data-i18n="register_subtitle">กรุณากรอกข้อมูลเพื่อสร้างบัญชีผู้ใช้งาน</p>
        </header>

        <form class="form" id="registerForm" novalidate>
          <div class="field">
            <label class="label" for="firstName" data-i18n="first_name_label">ชื่อ</label>
            <input class="input" id="firstName" name="firstName" type="text" autocomplete="given-name" placeholder="ชื่อ" data-i18n-placeholder="first_name_label" required />
            <p class="help" id="firstNameHelp"></p>
          </div>

          <div class="field">
            <label class="label" for="lastName" data-i18n="last_name_label">นามสกุล</label>
            <input class="input" id="lastName" name="lastName" type="text" autocomplete="family-name" placeholder="นามสกุล" data-i18n-placeholder="last_name_label" required />
            <p class="help" id="lastNameHelp"></p>
          </div>

          <div class="field">
            <label class="label" for="email" data-i18n="email_optional">อีเมล (ถ้ามี)</label>
            <input class="input" id="email" name="email" type="email" inputmode="email" autocomplete="email" placeholder="email@example.com" />
            <p class="help" id="emailHelp"></p>
          </div>

          <div class="field">
            <label class="label" for="phone" data-i18n="phone_label">เบอร์โทรศัพท์</label>
            <input class="input" id="phone" name="phone" type="tel" inputmode="tel" autocomplete="tel" placeholder="0XXXXXXXXX" maxlength="10" required />
            <p class="help" id="phoneHelp"></p>
          </div>

          <div class="error" id="formError" role="alert" aria-live="polite"></div>

          <button class="btn" id="nextBtn" type="submit" data-i18n="next_btn">ถัดไป</button>
          <p class="hint" id="hintText" aria-live="polite"></p>
        </form>

      </div>
    </section>
  </main>

  <script src="../../js/components/i18n.js"></script>
  <script src="../../js/utils/location-helper.js"></script>
  <script src="../../js/auth/register2.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (window.i18nInit) window.i18nInit();
    });
  </script>
</body>
</html>
