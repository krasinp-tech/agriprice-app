<!-- components/pricegovernment/government-price-card.html -->
<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ราคากลางรัฐบาล</title>

  <!-- ถ้าโปรเจกต์คุณมี global.css ให้ลิงก์เพิ่มเองได้ -->
  <link rel="stylesheet" href="./government-price-card.css" />
</head>
<body>
  <main class="gov-card">
    <div class="container">
      <header class="gov-card__header">
        <button class="btn-back" id="backBtn" type="button">← กลับ</button>

        <div class="gov-card__title">
          <h1 id="pageTitle">ราคากลางโดยรัฐบาล</h1>
          <div class="meta">
            <span id="commodityTag" class="tag">-</span>
            <span id="dateTag" class="muted">-</span>
          </div>
        </div>
      </header>

      <section class="gov-card__panel">
        <div id="state" class="state"></div>
        <div id="tableWrap"></div>
      </section>

      <p class="hint muted">
        * ตอนนี้เป็นข้อมูลจำลอง (mock) — พอทำ backend/cron เสร็จค่อยเปลี่ยนไปดึงจาก API ของคุณ
      </p>
    </div>
  </main>

  <script src="./mock-prices.js"></script>
  <script src="./government-price-card.js"></script>
</body>
</html>
