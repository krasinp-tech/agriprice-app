<script>
// ขอสิทธิ์ตำแหน่งเมื่อเข้าแอป
function requestLocationPermission() {
    if (!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(
        function (pos) {
            localStorage.setItem('userLat', pos.coords.latitude);
            localStorage.setItem('userLng', pos.coords.longitude);
        },
        function (err) {
            // ไม่อนุญาตหรือ error
            localStorage.removeItem('userLat');
            localStorage.removeItem('userLng');
        }
    );
}
document.addEventListener('DOMContentLoaded', requestLocationPermission);
</script>
<script>
// ให้คลิกที่ช่องค้นหาแล้วเลื่อนขึ้นและเปลี่ยนหน้า

    var input = document.getElementById('searchInput');
    if (input) {
        input.addEventListener('click', function () {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            setTimeout(function () {
                var q = input.value ? input.value.trim() : '';
                var url = q
                    ? 'pages/shared/search-results.html?q=' + encodeURIComponent(q)
                    : 'pages/shared/search-results.html';
                window.location.href = url;
            }, 350);
        });
    }
});
</script>

    <div id="favoritesMount"></div>
    <script>
        (async () => {
            const mount = document.getElementById("favoritesMount");
            if (!mount) return;

            // ตรวจสอบ role ทันที + รอ localStorage ที่ค่อนข้างเชื่อถือได้
            await new Promise(resolve => setTimeout(resolve, 100));
            
            const role = (localStorage.getItem("role") || "").toLowerCase();
            
            // debug
            console.log("[Favorites] Role detected:", role);
            
            if (role !== "farmer") {
                console.log("[Favorites] Hiding for non-farmer");
                mount.remove();
                return;
            }

            try {
                const res = await fetch("components/favorites/favorites.html");
                if (!res.ok) {
                    console.error("Load favorites.html failed:", res.status);
                    return;
                }
                mount.innerHTML = await res.text();

                // โหลด JS หลัง inject HTML แล้ว
                const s = document.createElement("script");
                s.src = "components/favorites/favorites.js";
                document.body.appendChild(s);

            } catch (err) {
                console.error("Favorites load error:", err);
            }
        })();
    </script>

<script>
// Smooth fade/slide transition when clicking search mount or input
function goToSearchResultsSmooth() {
    document.body.classList.add('smooth-fadeout');
    setTimeout(function () {
        var input = document.getElementById('searchInput');
        var q = input && input.value ? input.value.trim() : '';
        var url = q
            ? 'pages/shared/search-results.html?q=' + encodeURIComponent(q)
            : 'pages/shared/search-results.html';
        window.location.href = url;
    }, 400);
}
document.addEventListener('DOMContentLoaded', function () {
    var input = document.getElementById('searchInput');
    if (input) {
        input.addEventListener('click', goToSearchResultsSmooth);
    }
    var mount = document.getElementById('searchResultsMount');
    if (mount) {
        mount.addEventListener('click', goToSearchResultsSmooth);
    }
});
</script>
