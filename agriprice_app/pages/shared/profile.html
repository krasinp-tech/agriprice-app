<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>โปรไฟล์ผู้รับซื้อ - AGRIPRICE</title>

<link rel="stylesheet" href="../../css/global.css">
<link rel="stylesheet" href="../../css/shared-pages/profile.css">
<link rel="stylesheet" href="../../components/product-card/product-card.css">

<link rel="stylesheet" href="../../components/bottom-nav/bottom-nav.css">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
</head>

<body>

<!-- HERO -->
<section class="profile-hero fade-slide">
    <img class="profile-hero-img" id="heroImage" src="" alt="โปรไฟล์ผู้รับซื้อ">
    <button class="profile-hamburger" id="hamburgerBtn">
        <span class="material-icons-outlined">menu</span>
    </button>
    <div class="hero-badge">
        <span class="hero-badge-title" id="heroBadgeTitle"></span>
        <span class="hero-badge-sub" id="heroBadgeSub"></span>
    </div>
</section>



<!-- PROFILE CARD -->
<div class="profile-info-card fade-slide">

    <!-- Top Row -->
    <div class="profile-top-row">
        <div class="profile-avatar-wrap">
            <img id="profileAvatar" src="" alt="รูปผู้รับซื้อ">
        </div>
        <div class="profile-name-block">
            <div class="profile-name" id="profileName"></div>
            <div class="profile-tagline" id="profileTagline"></div>
        </div>
    </div>

    <!-- Status Row -->
    <div class="profile-status-row">
        <div class="status-online">
            <span class="status-dot"></span> ออนไลน์
        </div>
        <div class="status-followers">
            <span class="material-icons-outlined">person_outline</span>
            ผู้ติดตาม <span id="followersCount"></span>
        </div>
    </div>

    <!-- Action Row -->
    <div class="profile-action-row">
        <!-- ส่งข้อความ -->
        <a href="chat.html?marketId=123" class="btn-message">
            <span class="material-icons-outlined">chat_bubble_outline</span>
            ส่งข้อความ
        </a>


        <!-- ติดตาม -->
        <button class="btn-follow" id="followBtn">
            <span class="material-icons-outlined">person_add</span>
        </button>
    </div>


    <div class="profile-tabs">
        <button class="tab-btn active" data-tab="about">เกี่ยวกับ</button>
        <button class="tab-btn" data-tab="reviews">
            รีวิว <span class="tab-count" id="reviewCount"></span>
        </button>
    </div>

    <!-- ABOUT TAB -->
    <div class="tab-panel active" id="tab-about">
        <p class="about-desc" id="aboutDesc"></p>

        <!-- Location Card -->
        <div class="location-card">
            <div class="location-header">
                <div class="location-icon-wrap">
                    <span class="material-icons-outlined">location_on</span>
                </div>
                <div class="location-text">
                    <div class="location-address" id="addressLine1"></div>
                    <div class="location-sub" id="addressLine2"></div>
                </div>
                <a id="mapLink" target="_blank" class="location-link">
                    <span class="material-icons-outlined" style="font-size:14px">open_in_new</span>
                    แสดงแผนที่
                </a>
            </div>

            <div class="map-container">
                <iframe id="mapIframe" allowfullscreen loading="lazy"></iframe>
            </div>
        </div>

        <!-- Product List -->
        <div class="products-list-title">รายการการรับซื้อ</div>
        <div id="productListContainer"></div>
    </div>

    <!-- REVIEWS TAB -->
    <div class="tab-panel" id="tab-reviews">
        <div id="reviewListContainer"></div>
    </div>

</div>

<!-- Bottom Nav (component) -->
<div id="bottomNavMount"></div>

<script src="../../js/components.js"></script>
<script src="../../js/shared-pages/profile.js"></script>

<script>
  setTimeout(() => {
    document.querySelectorAll('.fade-slide').forEach(el => el.classList.add('show'));
  }, 60);
</script>

</body>
</html>
