<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>แชท | AGRIPRICE</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

  <link rel="stylesheet" href="../../css/global.css" />
  <link rel="stylesheet" href="../../css/shared-pages/chat.css" />
  <link rel="stylesheet" href="../../components/bottom-nav/bottom-nav.css" />
</head>

<body data-active="chat">

  <main class="chat-page fade-slide">
    <!-- Header -->
    <header class="chat-header fade-slide">
      <div class="chat-header-inner">
        <div class="chat-title">
          <span class="material-icons-outlined">chat_bubble_outline</span>
          <span>แชท</span>
        </div>
        <div class="chat-search">
          <span class="material-icons-outlined">search</span>
          <input id="chatSearchInput" type="text" placeholder="ค้นหาแชท / ผู้รับซื้อ" />
        </div>
      </div>
    </header>

    <!-- Layout -->
    <section class="chat-shell fade-slide">
      <!-- Left: conversation list -->
      <aside class="chat-list fade-slide" aria-label="รายการแชท">
        <div class="chat-list-top">
          <div class="chat-list-title">ข้อความล่าสุด</div>
          <button class="chat-refresh" id="chatRefreshBtn" type="button" title="รีเฟรช">
            <span class="material-icons-outlined">refresh</span>
          </button>
        </div>
        <div class="chat-list-items" id="chatListMount"></div>
      </aside>

      <!-- Right: conversation detail -->
      <section class="chat-room fade-slide" aria-label="ห้องแชท">
        <!-- Empty state -->
        <div class="chat-empty" id="chatEmptyState">
          <div class="chat-empty-card">
            <div class="chat-empty-icon">💬</div>
            <div class="chat-empty-title">เลือกแชทเพื่อเริ่มพูดคุย</div>
            <div class="chat-empty-sub">คุณสามารถติดต่อผู้รับซื้อและนัดหมายการจองคิวได้</div>
          </div>
        </div>

        <!-- Room header -->
        <div class="room-header" id="roomHeader" style="display:none;">
          <button class="room-back" id="roomBackBtn" type="button" title="ย้อนกลับ">
            <span class="material-icons-outlined">arrow_back</span>
          </button>
          <div class="room-user">
            <div class="room-avatar" id="roomAvatar">👤</div>
            <div class="room-user-text">
              <div class="room-name" id="roomName">-</div>
              <div class="room-sub" id="roomSub">ออนไลน์</div>
            </div>
          </div>
          <div class="room-actions">
            <button class="room-action" type="button" data-action="open-profile" title="ดูโปรไฟล์">
              <span class="material-icons-outlined">person_outline</span>
            </button>
            <button class="room-action" type="button" data-action="call" title="โทร">
              <span class="material-icons-outlined">call</span>
            </button>
          </div>
        </div>

        <!-- Messages -->
        <div class="room-messages" id="roomMessages" style="display:none;"></div>

        <!-- Image preview before send -->
        <div class="composer-preview" id="composerPreview" style="display:none;">
          <div class="preview-item">
            <img id="previewImage" src="" alt="" />
            <button type="button" class="preview-remove" id="previewRemoveBtn" title="ลบรูป">
              <span class="material-icons-outlined">close</span>
            </button>
          </div>
        </div>

        <!-- Composer -->
        <form class="room-composer" id="chatComposer" style="display:none;">
          <button type="button" class="composer-btn" data-action="attach" title="แนบรูป">
            <span class="material-icons-outlined">add_circle_outline</span>
          </button>
          <input id="chatImageInput" type="file" accept="image/*" hidden />
          <input id="chatMessageInput" type="text" placeholder="พิมพ์ข้อความ..." autocomplete="off" />
          <button type="submit" class="composer-send" title="ส่ง">
            <span class="material-icons-outlined">send</span>
          </button>
        </form>
      </section>
    </section>
  </main>

  <!-- Bottom Nav -->
  <div id="bottomNavMount"></div>

<script src="../../js/components.js"></script>
<script src="../../js/mockup/mockup.js"></script>
<script src="../../js/shared-pages/chat.js"></script>

<script src="../../js/auth/guard.js"></script>
<script>window.AuthGuard.requireLogin();</script>

<script>
  setTimeout(() => {
    document.querySelectorAll('.fade-slide').forEach(el => el.classList.add('show'));
  }, 60);
</script>

</body>
</html>
