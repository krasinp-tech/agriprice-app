<script>
// ขอสิทธิ์ตำแหน่งเมื่อเข้า search-results
function requestLocationPermission() {
    if (!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(
        function (pos) {
            localStorage.setItem('userLat', pos.coords.latitude);
            localStorage.setItem('userLng', pos.coords.longitude);
        },
        function (err) {
            localStorage.removeItem('userLat');
            localStorage.removeItem('userLng');
        }
    );
}
document.addEventListener('DOMContentLoaded', requestLocationPermission);
</script>
<style>
    body.smooth-fadein {
        opacity: 0;
        transform: translateY(40px);
        animation: fadein-slide-down 0.5s forwards;
    }
    @keyframes fadein-slide-down {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        document.body.classList.add('smooth-fadein');
    });
</script>
