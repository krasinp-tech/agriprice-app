<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>การจอง | AGRIPRICE</title>

  <link rel="stylesheet" href="../../../css/global.css" />
   <link rel="stylesheet" href="../../../components/bottom-nav/bottom-nav.css" />
  <link rel="stylesheet" href="../../../css/buyer/setbooking/booking.css" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
</head>

<body data-active="booking">
  <main class="page-shell">

    <!-- Header Section -->
  <main class="page-shell fade-slide">
    <section class="booking-header">
      <h1 class="booking-title">การจอง</h1>
      <p class="booking-subtitle">รายการการจอง</p>
    </section>

    <section class="controls">
      <div class="segmented" role="tablist" aria-label="ตัวกรองการจอง">
        <button class="seg-btn active" data-filter="all">ทั้งหมด</button>
        <button class="seg-btn" data-filter="waiting">รอคิว</button>
        <button class="seg-btn" data-filter="success">สำเร็จ</button>
        <button class="seg-btn" data-filter="cancel">ยกเลิก</button>
      </div>

      <div class="searchbox">
        <span class="material-icons-outlined">search</span>
        <input id="searchInput" type="text" placeholder="ค้นหาด้วยเลขจอง / ร้าน / คิว" />
      </div>
    </section>

    <section class="list" id="bookingList"></section>

    <div class="empty" id="emptyState" hidden>
      <div class="empty-card">
        <div class="empty-emoji">🧾</div>
        <div class="empty-title">ยังไม่มีรายการจองที่ตรงกับเงื่อนไข</div>
        <div class="empty-desc">ลองเปลี่ยนตัวกรอง หรือพิมพ์ค้นหาใหม่อีกครั้ง</div>
      </div>
    </div>
  </main>

  <!-- QR Scan Button (corner) -->
  <button id="scanBtn" class="scan-btn" aria-label="สแกนคิว QR">
    <span class="material-icons-outlined">qr_code_scanner</span>
  </button>

  <!-- Scan Modal -->
  <div id="scanModal" class="scan-modal" aria-hidden="true">
    <div class="scan-modal-content">
      <button id="closeScanBtn" class="scan-close" aria-label="ปิด">✕</button>
      <div class="scan-title">สแกน QR รหัสการจอง</div>
      <video id="scanVideo" autoplay playsinline></video>
      <div class="scan-actions">
        <input id="scanManualInput" placeholder="กรอกรหัสการจอง (ทดสอบ)" />
        <button id="scanManualBtn" class="btn">ค้นหา</button>
      </div>
      <div class="scan-hint">ระบบจะขอสิทธิ์เปิดกล้องเพื่อสแกน QR code</div>
    </div>
  </div>

  <!-- Bottom Nav (component) -->
  <div id="bottomNavMount"></div>


  <script src="../../../js/components.js"></script>
  <script src="../../../js/global-anim.js"></script>
  <script src="../../../js/mockup/mockup.js"></script>
  <script src="../../../js/buyer/setbooking/booking.js"></script>


<script src="../../../js/auth/guard.js"></script>
<script>window.AuthGuard.requireLogin();</script>



</body>
</html>
